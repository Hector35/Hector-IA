name: Hector OS Self Improve

"on":
  workflow_dispatch:
    inputs:
      task:
        description: Mejora concreta que Héctor OS debe investigar
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - scripts/self-improve.mjs
      - .github/workflows/self-improve.yml

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: hector-os-self-improve
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SELF_IMPROVE_TASK: ${{ inputs.task || 'Autoanaliza el núcleo contextual de Héctor OS. Encuentra una sola debilidad real y aplica una mejora pequeña con prueba o criterio reproducible. Evita cambios cosméticos.' }}
      SELF_IMPROVE_PROPOSAL_FILE: /tmp/self-improve-proposal.json
      GH_TOKEN: ${{ github.token }}
      BASE_URL: https://hector-os.hectorhdzr035.workers.dev
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - id: install
        run: npm ci
      - name: Build bounded repository request
        id: request
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const paths=['worker/lib/openai.ts','worker/lib/context.ts','worker/routes/intelligence.ts','worker/lib/openai.test.ts','worker/lib/context.test.ts'].filter(fs.existsSync);
          const files=paths.map(path=>({path,content:fs.readFileSync(path,'utf8')}));
          fs.writeFileSync('/tmp/self-improve-request.json',JSON.stringify({task:process.env.SELF_IMPROVE_TASK,files}));
          NODE
      - name: Obtain GitHub OIDC token
        id: oidc
        shell: bash
        run: |
          TOKEN="$(curl -fsS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=hector-os-self-improve" | jq -r .value)"
          test -n "$TOKEN"
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
      - name: Ask Héctor OS to inspect and improve itself
        id: proposal
        shell: bash
        env:
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          set -o pipefail
          for attempt in $(seq 1 20); do
            CODE="$(curl -sS -o /tmp/self-improve-proposal.json -w '%{http_code}' -H "Authorization: Bearer $OIDC_TOKEN" -H 'Content-Type: application/json' --data-binary @/tmp/self-improve-request.json "$BASE_URL/self-improve/v1/proposal" || true)"
            if [ "$CODE" = "200" ]; then break; fi
            cat /tmp/self-improve-proposal.json > /tmp/self-improve-error.txt 2>/dev/null || true
            sleep 6
          done
          test "${CODE:-0}" = "200"
          jq -e '.risk == "low" and (.changes|type == "array")' /tmp/self-improve-proposal.json
      - name: Apply proposal inside local safety cage
        id: agent
        shell: bash
        run: |
          set -o pipefail
          node scripts/self-improve.mjs 2> >(tee /tmp/self-improve-error.txt >&2)
      - name: Detect proposed changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff --stat
          fi
      - name: Typecheck
        id: typecheck
        if: steps.changes.outputs.changed == 'true'
        run: npm run typecheck
      - name: Tests
        id: tests
        if: steps.changes.outputs.changed == 'true'
        run: npm test -- --passWithNoTests
      - name: Build
        id: build
        if: steps.changes.outputs.changed == 'true'
        run: npm run build
      - name: Create guarded improvement branch
        if: steps.changes.outputs.changed == 'true'
        id: branch
        shell: bash
        run: |
          BRANCH="hector-self-improve/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git config user.name "Hector OS"
          git config user.email "actions@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add worker/lib/openai.ts worker/lib/context.ts worker/routes/intelligence.ts worker/lib/openai.test.ts worker/lib/context.test.ts 2>/dev/null || true
          git commit -m "feat(ai): autonomous guarded improvement"
          git push origin "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
      - name: Open pull request for human-visible audit
        if: steps.changes.outputs.changed == 'true'
        id: pr
        shell: bash
        run: |
          PR_URL="$(gh pr create --base main --head '${{ steps.branch.outputs.name }}' --title 'Héctor OS: propuesta autónoma de mejora' --body-file /tmp/self-improve-report.md)"
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "$PR_URL" >> "$GITHUB_STEP_SUMMARY"
      - name: Publish success receipt
        if: success()
        shell: bash
        run: |
          if [ "${{ steps.changes.outputs.changed }}" = "true" ]; then
            gh issue create --title "[self-improve] PROPUESTA OK ${GITHUB_SHA::7}" --body "Héctor OS leyó su código mediante GitHub Actions, pidió la propuesta a su Worker autenticado por OIDC, pasó typecheck, pruebas y build, y abrió un PR: ${{ steps.pr.outputs.url }}"
          else
            gh issue create --title "[self-improve] SIN CAMBIOS ${GITHUB_SHA::7}" --body-file /tmp/self-improve-report.md
          fi
      - name: Publish failure receipt
        if: failure()
        shell: bash
        run: |
          REASON="$(tail -n 10 /tmp/self-improve-error.txt 2>/dev/null | sed -E 's/(sk-[A-Za-z0-9_-]+)/[REDACTED]/g' | head -c 1400 || true)"
          BODY="El ciclo autónomo falló de forma segura. No se modificó main ni producción.\n\nResultados:\n- OIDC: ${{ steps.oidc.outcome }}\n- propuesta: ${{ steps.proposal.outcome }}\n- agente: ${{ steps.agent.outcome }}\n- typecheck: ${{ steps.typecheck.outcome }}\n- pruebas: ${{ steps.tests.outcome }}\n- build: ${{ steps.build.outcome }}\n\nDiagnóstico sanitizado:\n\`\`\`\n${REASON:-Sin detalle disponible}\n\`\`\`"
          gh issue create --title "[self-improve] FALLO ${GITHUB_SHA::7}" --body "$BODY"
