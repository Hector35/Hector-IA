name: Hector model Qwen15 v2 training

on:
  pull_request:
    branches: [main]
    paths:
      - 'model/hector-asi/data/qwen15-sft-v2.jsonl'
      - 'model/hector-asi/evals/qwen15-held-out-v2.jsonl'
      - 'model/hector-asi/train_qwen15.py'
      - '.github/workflows/hector-model-qwen15-v2.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  train-qwen15-v2:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      HF_HUB_DISABLE_TELEMETRY: '1'
      TOKENIZERS_PARALLELISM: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pinned CPU stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu 'torch==2.7.1'
          python -m pip install 'transformers==4.53.2' 'peft==0.16.0' 'accelerate==1.8.1' 'safetensors==0.5.3'
      - name: Train two deterministic Qwen 1.5B replicas
        run: |
          python model/hector-asi/train_qwen15.py --experiment-id hector-asi-qwen15-v2 --train-file model/hector-asi/data/qwen15-sft-v2.jsonl --validation-file model/hector-asi/evals/qwen15-held-out-v2.jsonl --output-dir artifacts/hector-asi-qwen15-v2-a --epochs 1 --max-length 64 --lr 0.00015 --seed 35
          python model/hector-asi/train_qwen15.py --experiment-id hector-asi-qwen15-v2 --train-file model/hector-asi/data/qwen15-sft-v2.jsonl --validation-file model/hector-asi/evals/qwen15-held-out-v2.jsonl --output-dir artifacts/hector-asi-qwen15-v2-b --epochs 1 --max-length 64 --lr 0.00015 --seed 35
      - name: Verify weights, hidden improvement and byte identity
        run: |
          python - <<'PY'
          import hashlib,json
          from pathlib import Path
          a=Path('artifacts/hector-asi-qwen15-v2-a'); b=Path('artifacts/hector-asi-qwen15-v2-b')
          ma=json.loads((a/'metrics.json').read_text()); mb=json.loads((b/'metrics.json').read_text())
          ra=ma['results']; rb=mb['results']
          assert ra['weightsGenerated'] is True and rb['weightsGenerated'] is True
          assert ra['parameterDeltaL2'] > 0 and rb['parameterDeltaL2'] > 0
          assert ra['candidateValidationLoss'] < ra['baseValidationLoss']
          wa=a/'adapter/adapter_model.safetensors'; wb=b/'adapter/adapter_model.safetensors'
          digest=lambda p: hashlib.sha256(p.read_bytes()).hexdigest()
          assert digest(wa)==digest(wb)
          print(json.dumps({'adapterSha256':digest(wa),'results':ra},indent=2))
          PY
      - name: Upload immutable adapter and evaluation
        uses: actions/upload-artifact@v4
        with:
          name: hector-asi-qwen15-v2-${{ github.run_id }}
          path: artifacts/hector-asi-qwen15-v2-a
          if-no-files-found: error
          retention-days: 90
