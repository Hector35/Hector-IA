name: Hector model Qwen15 v65 curriculum training
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/hector-model-qwen15-v65-curriculum-training.yml'
      - 'model/hector-asi/training/train_qwen15_v65_curriculum.py'
      - 'model/hector-asi/capability_loop/build_curriculum_v65.py'
  workflow_dispatch:
permissions:
  contents: read
  actions: read
concurrency:
  group: hector-qwen15-v65-curriculum-${{ github.ref }}
  cancel-in-progress: false
jobs:
  train-qwen15-v65:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      SOURCE_ARTIFACT_ID: '8560331055'
      SOURCE_SHA: '31bead5f59982d8e321517fd235b81f992f83d2e3792a55690c2a841ff0e28f8'
      SOURCE_BYTES: '73911112'
      DATA: /tmp/v65-data
      SRC: /tmp/hector-v41/adapter
      OUT_A: artifacts/hector-asi-qwen15-v65-a
      OUT_B: artifacts/hector-asi-qwen15-v65-b
      TOKENIZERS_PARALLELISM: 'false'
      HF_HOME: /home/runner/.cache/huggingface
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Generate sealed curriculum and validate trainer
        run: |
          set -euo pipefail
          python -m py_compile model/hector-asi/capability_loop/build_curriculum_v65.py model/hector-asi/training/train_qwen15_v65_curriculum.py
          python model/hector-asi/capability_loop/build_curriculum_v65.py --out "$DATA"
          python - <<'PY'
          import json,os
          from pathlib import Path
          root=Path(os.environ['DATA']);m=json.loads((root/'manifest.json').read_text())
          assert m['counts']=={'train':144,'validation':36,'hidden':36}
          assert m['promotionGates']['hiddenBehaviorGainMinimum']==3
          assert m['promotionGates']['noCapabilityRegression'] is True
          print(json.dumps(m,sort_keys=True))
          PY
      - name: Download and verify immutable V41
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/v41zip /tmp/hector-v41
          curl --fail --location --retry 4 -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${SOURCE_ARTIFACT_ID}/zip" -o /tmp/v41.zip
          unzip -q /tmp/v41.zip -d /tmp/v41zip
          F="$(find /tmp/v41zip -type f -path '*/adapter/adapter_model.safetensors' -print -quit)"
          test -n "$F"
          test "$(sha256sum "$F"|awk '{print $1}')" = "$SOURCE_SHA"
          test "$(stat -c%s "$F")" -eq "$SOURCE_BYTES"
          cp -a "$(dirname "$F")" "$SRC"
      - name: Install pinned CPU stack
        run: |
          python -m pip install --disable-pip-version-check --index-url https://download.pytorch.org/whl/cpu torch==2.7.1
          python -m pip install --disable-pip-version-check accelerate==1.8.1 huggingface_hub==0.34.4 peft==0.16.0 safetensors==0.5.3 transformers==4.53.2
      - name: Train two deterministic V65 replicas
        run: |
          set -o pipefail
          mkdir -p artifacts/logs
          for spec in "$OUT_A:a" "$OUT_B:b"; do
            IFS=: read -r out tag <<< "$spec"
            /usr/bin/time -v python model/hector-asi/training/train_qwen15_v65_curriculum.py \
              --source-adapter "$SRC" --train "$DATA/train.jsonl" --validation "$DATA/validation.jsonl" --hidden "$DATA/hidden.jsonl" \
              --out "$out" --epochs 1 --lr 8e-7 --eos-lambda .08 --max-length 144 --seed 3065 2>&1 | tee "artifacts/logs/v65-${tag}.log"
          done
      - name: Verify weights and promotion decision
        run: |
          set -euo pipefail
          A="$OUT_A/adapter/adapter_model.safetensors"; B="$OUT_B/adapter/adapter_model.safetensors"
          test -f "$A" -a -f "$B"; cmp "$A" "$B"; test "$(stat -c%s "$A")" -gt 50000000
          python - <<'PY'
          import json
          from pathlib import Path
          a=json.loads(Path('artifacts/hector-asi-qwen15-v65-a/metrics.json').read_text())
          b=json.loads(Path('artifacts/hector-asi-qwen15-v65-b/metrics.json').read_text())
          assert a['candidate']['adapterSha256']==b['candidate']['adapterSha256']
          assert a['candidate']['adapterBytes']==b['candidate']['adapterBytes']
          print(json.dumps({'sha256':a['candidate']['adapterSha256'],'bytes':a['candidate']['adapterBytes'],'baselineHidden':a['baseline']['behavioral']['passed'],'candidateHidden':a['candidate']['behavioral']['passed'],'hiddenGain':a['candidate']['hiddenGain'],'capabilityGains':a['candidate']['capabilityGains'],'eligible':a['gates']['eligibleForPromotion']},sort_keys=True))
          PY
      - name: Upload weights, metrics, curriculum and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hector-asi-qwen15-v65-curriculum-${{ github.run_id }}
          path: |
            artifacts/hector-asi-qwen15-v65-a
            artifacts/hector-asi-qwen15-v65-b
            artifacts/logs
            /tmp/v65-data
          if-no-files-found: warn
          retention-days: 90
