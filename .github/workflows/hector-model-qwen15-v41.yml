name: Hector model Qwen15 v41 corrective training
on:
  pull_request:
    branches: [main]
    paths:
      - 'model/hector-asi/data/qwen15-sft-v5.jsonl'
      - 'model/hector-asi/data/qwen15-sft-v6-supplement.jsonl'
      - 'model/hector-asi/data/qwen15-corrective-v41-train.jsonl'
      - 'model/hector-asi/evals/qwen15-corrective-v41-validation.jsonl'
      - 'model/hector-asi/evals/qwen15-corrective-v41-hidden.jsonl'
      - 'model/hector-asi/train_qwen15_v41.py'
      - '.github/workflows/hector-model-qwen15-v41.yml'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  train-qwen15-v41:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      HF_HUB_DISABLE_TELEMETRY: '1'
      TOKENIZERS_PARALLELISM: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate source and sealed splits
        run: |
          python -m py_compile model/hector-asi/train_qwen15_v41.py
          python - <<'PY'
          import json
          from pathlib import Path
          paths=['model/hector-asi/data/qwen15-corrective-v41-train.jsonl','model/hector-asi/evals/qwen15-corrective-v41-validation.jsonl','model/hector-asi/evals/qwen15-corrective-v41-hidden.jsonl']
          sets=[]
          for p in paths:
            rows=[json.loads(x) for x in Path(p).read_text().splitlines() if x.strip()]
            assert rows and all(r['verification']['verified'] and r['verification']['source']=='author-generated' for r in rows)
            ids={r['id'] for r in rows};prompts={' '.join(m['content'].lower().split()) for r in rows for m in r['messages'] if m['role']=='user'}
            assert len(ids)==len(rows) and len(prompts)==len(rows);sets.append((ids,prompts))
          for i in range(3):
            for j in range(i+1,3): assert not sets[i][0]&sets[j][0] and not sets[i][1]&sets[j][1]
          assert [len(s[0]) for s in sets]==[16,8,12]
          PY
      - name: Install pinned CPU stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu 'torch==2.7.1'
          python -m pip install 'transformers==4.53.2' 'peft==0.16.0' 'accelerate==1.8.1' 'safetensors==0.5.3'
      - name: Train two memory-bounded corrective replicas
        run: |
          mkdir -p artifacts/logs
          for replica in a b; do
            /usr/bin/time -v python model/hector-asi/train_qwen15_v41.py \
              --train-files model/hector-asi/data/qwen15-sft-v5.jsonl model/hector-asi/data/qwen15-sft-v6-supplement.jsonl model/hector-asi/data/qwen15-corrective-v41-train.jsonl \
              --validation-files model/hector-asi/evals/qwen15-corrective-v41-validation.jsonl \
              --test-files model/hector-asi/evals/qwen15-corrective-v41-hidden.jsonl \
              --experiment-id hector-asi-qwen15-v41 \
              --output-dir artifacts/hector-asi-qwen15-v41-$replica \
              --epochs 3 --max-length 160 --lr 3e-5 --seed 35 2>&1 | tee artifacts/logs/replica-$replica.log
          done
      - name: Verify reproducibility and hidden-test gate
        run: |
          python - <<'PY'
          import hashlib,json
          from pathlib import Path
          roots=[Path('artifacts/hector-asi-qwen15-v41-a'),Path('artifacts/hector-asi-qwen15-v41-b')]
          def sha(p): return hashlib.sha256(p.read_bytes()).hexdigest()
          metrics=[json.loads((r/'metrics.json').read_text()) for r in roots];hashes=[sha(r/'adapter'/'adapter_model.safetensors') for r in roots];x=metrics[0]['results']
          summary={'adapterSha256':hashes[0],'byteIdenticalReplicas':hashes[0]==hashes[1],'baseHiddenTestLoss':x['baseHiddenTestLoss'],'candidateHiddenTestLoss':x['candidateHiddenTestLoss'],'relativeHiddenImprovement':x['relativeHiddenImprovement'],'bestEpoch':metrics[0]['hyperparameters']['bestEpoch'],'adapterBytes':x['adapterBytes'],'peakRssMb':metrics[0]['runtime']['peakRssMb'],'rollback':'hector-asi-qwen15-v15'}
          (roots[0]/'reproducibility.json').write_text(json.dumps(summary,indent=2)+'\n');print(json.dumps(summary,indent=2))
          assert hashes[0]==hashes[1]
          for m,r in zip(metrics,roots):
            y=m['results'];d=m['dataset'];assert y['weightsGenerated'] and y['parameterDeltaL2']>0 and y['candidateHiddenTestLoss']<y['baseHiddenTestLoss'] and y['relativeHiddenImprovement']>=.03 and y['adapterBytes']>30000000
            assert d['trainExamples']==56 and d['validationExamples']==8 and d['testExamples']==12 and d['crossSplitOverlap']==0 and (r/'SHA256SUMS').is_file()
          PY
      - name: Upload immutable adapter, evidence, and failure logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hector-asi-qwen15-v41-${{ github.run_id }}
          path: |
            artifacts/hector-asi-qwen15-v41-a
            artifacts/logs
          if-no-files-found: warn
          retention-days: 90
