name: Hector model CPU smoke training

on:
  pull_request:
    branches: [main]
    paths:
      - "model/hector-asi/**"
      - ".github/workflows/hector-model-cpu-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  train-real-lora-weights:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      HF_HUB_DISABLE_TELEMETRY: "1"
      TOKENIZERS_PARALLELISM: "false"
      PYTHONHASHSEED: "35"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
    steps:
      - name: Checkout candidate branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CPU training stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch==2.7.1"
          python -m pip install "transformers==4.53.2" "peft==0.16.0" "accelerate==1.8.1" "safetensors==0.5.3"

      - name: Train two real LoRA replicas
        run: |
          for replica in a b; do
            taskset -c 0 python model/hector-asi/train_cpu_smoke.py \
              --model openai-community/gpt2 \
              --revision 607a30d783dfa663caf39e06633721c8d4cfcd7e \
              --train-file model/hector-asi/data/sft-seed-v1.jsonl \
              --validation-file model/hector-asi/evals/cpu-smoke-held-out-v1.jsonl \
              --output-dir "artifacts/hector-asi-cpu-smoke-v1-${replica}" \
              --epochs 2 \
              --max-length 128 \
              --learning-rate 5e-4 \
              --seed 35
          done

      - name: Prove same-run reproducibility
        run: |
          python - <<'PY'
          import hashlib
          import json
          import shutil
          from pathlib import Path

          def digest(path: Path) -> str:
              return hashlib.sha256(path.read_bytes()).hexdigest()

          root = Path("artifacts")
          a = root / "hector-asi-cpu-smoke-v1-a"
          b = root / "hector-asi-cpu-smoke-v1-b"
          a_hash = digest(a / "adapter" / "adapter_model.safetensors")
          b_hash = digest(b / "adapter" / "adapter_model.safetensors")
          if a_hash != b_hash:
              raise SystemExit(f"Adapter reproduction mismatch: {a_hash} != {b_hash}")
          final = root / "hector-asi-cpu-smoke-v1"
          shutil.copytree(a, final)
          (final / "reproduction.json").write_text(json.dumps({
              "schemaVersion": "1.0.0",
              "replicas": 2,
              "sameRunner": True,
              "adapterSha256": a_hash,
              "identical": True
          }, indent=2, sort_keys=True) + "\n")
          print(a_hash)
          PY

      - name: Verify generated weights and hashes
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("artifacts/hector-asi-cpu-smoke-v1")
          metrics = json.loads((root / "metrics.json").read_text())
          reproduction = json.loads((root / "reproduction.json").read_text())
          assert metrics["results"]["weightsGenerated"] is True
          assert metrics["results"]["parameterDeltaL2"] > 0
          assert reproduction["identical"] is True
          assert (root / "adapter" / "adapter_model.safetensors").is_file()
          assert (root / "SHA256SUMS").is_file()
          assert (root / "run-manifest.json").is_file()
          print(json.dumps({"results": metrics["results"], "reproduction": reproduction}, indent=2))
          PY

      - name: Upload immutable training artifact
        uses: actions/upload-artifact@v4
        with:
          name: hector-asi-cpu-smoke-${{ github.run_id }}
          path: artifacts/hector-asi-cpu-smoke-v1
          if-no-files-found: error
          retention-days: 90
