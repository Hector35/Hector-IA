name: Agent Browser

on:
  workflow_dispatch:
    inputs:
      url:
        description: URL HTTPS a verificar
        required: true
        type: string
      viewport:
        description: Viewport, por ejemplo 390x844
        required: false
        default: 390x844
        type: string
      job_id:
        description: UUID opcional del trabajo
        required: false
        type: string
      user_id:
        description: UUID opcional del propietario
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      BASE_URL: https://hector-os.hectorhdzr035.workers.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validar URL
        env:
          TARGET_URL: ${{ inputs.url }}
        run: node -e "const u=new URL(process.env.TARGET_URL);if(u.protocol!=='https:')throw new Error('Solo HTTPS');"
      - name: Instalar Playwright
        run: npm install --no-save playwright && npx playwright install --with-deps chromium
      - name: Navegar y capturar evidencia
        env:
          TARGET_URL: ${{ inputs.url }}
          VIEWPORT: ${{ inputs.viewport }}
        run: |
          node --input-type=module <<'EOF'
          import {chromium} from 'playwright';
          import {mkdir,writeFile} from 'node:fs/promises';
          const [width,height]=String(process.env.VIEWPORT||'390x844').split('x').map(Number);
          const browser=await chromium.launch({headless:true});
          const page=await browser.newPage({viewport:{width,height}});
          const errors=[];
          page.on('console',m=>{if(m.type()==='error')errors.push(m.text())});
          page.on('pageerror',e=>errors.push(e.message));
          const response=await page.goto(process.env.TARGET_URL,{waitUntil:'networkidle',timeout:45000});
          await mkdir('agent-evidence',{recursive:true});
          await page.screenshot({path:'agent-evidence/page.png',fullPage:true});
          const report={url:page.url(),title:await page.title(),status:response?.status()??null,viewport:{width,height},errors,checkedAt:new Date().toISOString()};
          await writeFile('agent-evidence/report.json',JSON.stringify(report,null,2));
          console.log(report);
          await browser.close();
          if(!response||response.status()>=400)process.exitCode=1;
          EOF
      - name: Obtener token OIDC
        id: oidc
        if: always()
        shell: bash
        run: |
          TOKEN="$(curl -fsS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=hector-os-evidence" | jq -r .value)"
          test -n "$TOKEN"
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
      - name: Integrar artefactos en Héctor OS
        if: always()
        env:
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
          JOB_ID: ${{ inputs.job_id }}
          USER_ID: ${{ inputs.user_id }}
        shell: bash
        run: |
          node --input-type=module <<'EOF'
          import fs from 'node:fs';
          const report=JSON.parse(fs.readFileSync('agent-evidence/report.json','utf8'));
          const screenshotBase64=fs.readFileSync('agent-evidence/page.png').toString('base64');
          const payload={jobId:process.env.JOB_ID||undefined,userId:process.env.USER_ID||undefined,source:'agent-browser',url:report.url,title:report.title,status:report.status,errors:report.errors,runId:process.env.GITHUB_RUN_ID,screenshotBase64};
          fs.writeFileSync('/tmp/evidence.json',JSON.stringify(payload));
          EOF
          curl -fsS -H "Authorization: Bearer $OIDC_TOKEN" -H 'Content-Type: application/json' --data-binary @/tmp/evidence.json "$BASE_URL/evidence/v1/browser"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-browser-evidence
          path: agent-evidence
          retention-days: 7
