name: Cleanup Success Receipts

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/cleanup-success-receipts.yml'

permissions:
  contents: read
  issues: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Cerrar recibos automáticos exitosos
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t RECEIPTS < <(
            gh issue list \
              --repo "$GITHUB_REPOSITORY" \
              --state open \
              --limit 1000 \
              --json number,title \
              --jq '.[] | [.number,.title] | @tsv'
          )

          ISSUES=()
          for receipt in "${RECEIPTS[@]}"; do
            IFS=$'\t' read -r number title <<< "$receipt"
            case "$title" in
              "[runner-verify] OK"|"[runner-verify] OK "*|\
              "[deploy-production] OK"|"[deploy-production] OK "*|\
              "[production-intelligence] OK"|"[production-intelligence] OK "*|\
              "[production-smoke] OK"|"[production-smoke] OK "*|\
              "[intelligence-unit] OK"|"[intelligence-unit] OK "*)
                ISSUES+=("$number")
                ;;
            esac
          done

          for issue in "${ISSUES[@]}"; do
            gh issue comment "$issue" \
              --repo "$GITHUB_REPOSITORY" \
              --body "Cerrado automáticamente durante la limpieza de recibos exitosos. Los resultados correctos ahora permanecen en GitHub Job Summary; los issues quedan reservados para fallos accionables."
            gh issue close "$issue" \
              --repo "$GITHUB_REPOSITORY" \
              --reason completed
          done

          {
            echo "## Limpieza de recibos exitosos"
            echo
            echo "- Issues cerrados: ${#ISSUES[@]}"
            echo "- Prefijos permitidos: runner-verify, deploy-production, production-intelligence, production-smoke e intelligence-unit."
            echo "- Los issues de fallo no fueron modificados."
          } >> "$GITHUB_STEP_SUMMARY"
