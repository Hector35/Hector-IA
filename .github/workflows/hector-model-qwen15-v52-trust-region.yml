name: Hector model Qwen15 v52 trust-region
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/hector-model-qwen15-v52-trust-region.yml'
      - 'model/hector-asi/training/train_qwen15_v52_trust_region.py'
      - 'model/hector-asi/data/qwen15-v51-unlikelihood-train.jsonl'
      - 'model/hector-asi/evals/qwen15-v51-unlikelihood-validation.jsonl'
      - 'model/hector-asi/evals/qwen15-v51-hidden.jsonl'
  workflow_dispatch:
permissions:
  contents: read
  actions: read
concurrency:
  group: hector-qwen15-v52-${{ github.ref }}
  cancel-in-progress: false
jobs:
  train-qwen15-v52:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      SOURCE_ARTIFACT_ID: '8560331055'
      SOURCE_SHA: '31bead5f59982d8e321517fd235b81f992f83d2e3792a55690c2a841ff0e28f8'
      SOURCE_BYTES: '73911112'
      SOURCE_DIR: /tmp/hector-v41/adapter
      TRAIN: model/hector-asi/data/qwen15-v51-unlikelihood-train.jsonl
      VALIDATION: model/hector-asi/evals/qwen15-v51-unlikelihood-validation.jsonl
      HIDDEN: model/hector-asi/evals/qwen15-v51-hidden.jsonl
      OUT_A: artifacts/hector-asi-qwen15-v52-a
      OUT_B: artifacts/hector-asi-qwen15-v52-b
      TOKENIZERS_PARALLELISM: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate trainer and sealed splits
        run: |
          python -m py_compile model/hector-asi/training/train_qwen15_v52_trust_region.py
          python - <<'PY'
          import json,unicodedata
          from pathlib import Path
          def norm(s): return ' '.join(unicodedata.normalize('NFKD',s).encode('ascii','ignore').decode().lower().split())
          groups=[]
          for path,count in [('${{ env.TRAIN }}',16),('${{ env.VALIDATION }}',6),('${{ env.HIDDEN }}',18)]:
            rows=[json.loads(x) for x in Path(path).read_text().splitlines() if x.strip()]
            assert len(rows)==count and len({x['id'] for x in rows})==count and len({norm(x['prompt']) for x in rows})==count
            groups.append({norm(x['prompt']) for x in rows})
          assert not groups[0]&groups[1] and not groups[0]&groups[2] and not groups[1]&groups[2]
          print('train=16 validation=6 hidden=18 contamination=0')
          PY
      - name: Download and verify immutable champion v41
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/v41zip /tmp/hector-v41
          curl --fail --location --retry 4 -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${SOURCE_ARTIFACT_ID}/zip" -o /tmp/v41.zip
          unzip -q /tmp/v41.zip -d /tmp/v41zip
          F="$(find /tmp/v41zip -type f -path '*/adapter/adapter_model.safetensors' -print -quit)"
          test -n "$F"; test "$(sha256sum "$F" | awk '{print $1}')" = "$SOURCE_SHA"; test "$(stat -c%s "$F")" -eq "$SOURCE_BYTES"
          cp -a "$(dirname "$F")" "$SOURCE_DIR"
      - name: Install pinned CPU stack
        run: |
          python -m pip install --disable-pip-version-check --index-url https://download.pytorch.org/whl/cpu torch==2.7.1
          python -m pip install --disable-pip-version-check accelerate==1.8.1 huggingface_hub==0.34.4 peft==0.16.0 safetensors==0.5.3 transformers==4.53.2
      - name: Train two deterministic real replicas
        run: |
          set -euo pipefail
          /usr/bin/time -v python model/hector-asi/training/train_qwen15_v52_trust_region.py --source-adapter "$SOURCE_DIR" --train "$TRAIN" --validation "$VALIDATION" --hidden "$HIDDEN" --out "$OUT_A" --seed 3052 2>&1 | tee /tmp/v52-a.log
          /usr/bin/time -v python model/hector-asi/training/train_qwen15_v52_trust_region.py --source-adapter "$SOURCE_DIR" --train "$TRAIN" --validation "$VALIDATION" --hidden "$HIDDEN" --out "$OUT_B" --seed 3052 2>&1 | tee /tmp/v52-b.log
      - name: Verify reproducibility and evidence
        run: |
          set -euo pipefail
          A="$OUT_A/adapter/adapter_model.safetensors"; B="$OUT_B/adapter/adapter_model.safetensors"
          test -f "$A" -a -f "$B"; cmp "$A" "$B"; test "$(stat -c%s "$A")" -gt 50000000
          python - <<'PY'
          import json
          from pathlib import Path
          a=json.loads(Path('artifacts/hector-asi-qwen15-v52-a/metrics.json').read_text())
          b=json.loads(Path('artifacts/hector-asi-qwen15-v52-b/metrics.json').read_text())
          assert a['candidate']['adapterSha256']==b['candidate']['adapterSha256']
          assert a['candidate']['adapterBytes']==b['candidate']['adapterBytes']
          assert a['gates']['validationImproved']
          print(json.dumps({'sha256':a['candidate']['adapterSha256'],'bytes':a['candidate']['adapterBytes'],'baseline':a['baseline']['behavioral'],'candidate':a['candidate']['behavioral'],'gates':a['gates']},indent=2,sort_keys=True))
          PY
      - name: Upload weights, metrics and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hector-asi-qwen15-v52-trust-region-${{ github.run_id }}
          path: |
            artifacts/hector-asi-qwen15-v52-a
            artifacts/hector-asi-qwen15-v52-b
            /tmp/v52-a.log
            /tmp/v52-b.log
          retention-days: 90
          if-no-files-found: warn
