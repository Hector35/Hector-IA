name: Hector model Qwen15 v59 SLiC training
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/hector-model-qwen15-v59-slic.yml'
      - 'model/hector-asi/training/train_qwen15_v59_slic.py'
      - 'model/hector-asi/data/qwen15-v59-slic-train.jsonl'
      - 'model/hector-asi/evals/qwen15-v59-slic-validation.jsonl'
  workflow_dispatch:
permissions:
  contents: read
  actions: read
concurrency:
  group: hector-qwen15-v59-slic-${{ github.ref }}
  cancel-in-progress: false
jobs:
  train-qwen15-v59:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SOURCE_ARTIFACT_ID: '8560331055'
      SOURCE_SHA: '31bead5f59982d8e321517fd235b81f992f83d2e3792a55690c2a841ff0e28f8'
      SOURCE_BYTES: '73911112'
      SOURCE_DIR: /tmp/hector-v41/adapter
      TRAIN: model/hector-asi/data/qwen15-v59-slic-train.jsonl
      VALIDATION: model/hector-asi/evals/qwen15-v59-slic-validation.jsonl
      HIDDEN: model/hector-asi/evals/qwen15-v51-hidden.jsonl
      OUT_A: artifacts/hector-asi-qwen15-v59-a
      OUT_B: artifacts/hector-asi-qwen15-v59-b
      TOKENIZERS_PARALLELISM: 'false'
      HF_HOME: /home/runner/.cache/huggingface
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Validate licensed data, splits and trainer
        run: |
          set -euo pipefail
          python -m py_compile model/hector-asi/training/train_qwen15_v59_slic.py
          python - <<'PY'
          import json,os,unicodedata
          from pathlib import Path
          files={'train':(os.environ['TRAIN'],12),'validation':(os.environ['VALIDATION'],6),'hidden':(os.environ['HIDDEN'],18)}
          rows={k:[json.loads(x) for x in Path(p).read_text().splitlines() if x.strip()] for k,(p,_) in files.items()}
          for k,(_,n) in files.items(): assert len(rows[k])==n,(k,len(rows[k]))
          norm=lambda s:' '.join(''.join(c for c in unicodedata.normalize('NFKD',s.lower()) if not unicodedata.combining(c)).split())
          sig=[]
          for k in ('train','validation','hidden'):
            ids={x['id'] for x in rows[k]}; prompts={norm(x['prompt']) for x in rows[k]};assert len(ids)==len(rows[k]) and len(prompts)==len(rows[k]);sig.append((ids,prompts))
          for i in range(3):
            for j in range(i+1,3):assert not sig[i][0]&sig[j][0] and not sig[i][1]&sig[j][1]
          assert all(x['verified'] and x['provenance']=='author-generated' and x['license']=='Apache-2.0-compatible' for x in rows['train']+rows['validation'])
          assert sum(bool(x.get('critical')) for x in rows['hidden'])==6
          print('train=12 validation=6 hidden=18 critical=6 contamination=0 privateData=false')
          PY
      - name: Download and verify immutable champion v41
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/v41zip /tmp/hector-v41
          curl --fail --location --retry 4 -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${SOURCE_ARTIFACT_ID}/zip" -o /tmp/v41.zip
          unzip -q /tmp/v41.zip -d /tmp/v41zip
          F="$(find /tmp/v41zip -type f -path '*/adapter/adapter_model.safetensors' -print -quit)"
          test -n "$F"
          test "$(sha256sum "$F" | awk '{print $1}')" = "$SOURCE_SHA"
          test "$(stat -c%s "$F")" -eq "$SOURCE_BYTES"
          cp -a "$(dirname "$F")" "$SOURCE_DIR"
      - name: Install pinned CPU stack
        run: |
          python -m pip install --disable-pip-version-check --index-url https://download.pytorch.org/whl/cpu torch==2.7.1
          python -m pip install --disable-pip-version-check accelerate==1.8.1 huggingface_hub==0.34.4 peft==0.16.0 safetensors==0.5.3 transformers==4.53.2
      - name: Train two deterministic calibrated continuations
        run: |
          set -o pipefail
          mkdir -p artifacts/logs
          /usr/bin/time -v python model/hector-asi/training/train_qwen15_v59_slic.py --source-adapter "$SOURCE_DIR" --train "$TRAIN" --validation "$VALIDATION" --hidden "$HIDDEN" --out "$OUT_A" --epochs 3 --lr 2e-6 --margin .12 --rank-lambda .55 --anchor .03 --seed 3059 2>&1 | tee artifacts/logs/v59-a.log
          /usr/bin/time -v python model/hector-asi/training/train_qwen15_v59_slic.py --source-adapter "$SOURCE_DIR" --train "$TRAIN" --validation "$VALIDATION" --hidden "$HIDDEN" --out "$OUT_B" --epochs 3 --lr 2e-6 --margin .12 --rank-lambda .55 --anchor .03 --seed 3059 2>&1 | tee artifacts/logs/v59-b.log
      - name: Verify real weights and reproducibility
        run: |
          set -euo pipefail
          A="$OUT_A/adapter/adapter_model.safetensors";B="$OUT_B/adapter/adapter_model.safetensors"
          test -f "$A" -a -f "$B";cmp "$A" "$B";test "$(stat -c%s "$A")" -gt 50000000
          python - <<'PY'
          import json
          from pathlib import Path
          a=json.loads(Path('artifacts/hector-asi-qwen15-v59-a/metrics.json').read_text());b=json.loads(Path('artifacts/hector-asi-qwen15-v59-b/metrics.json').read_text())
          assert a['candidate']['adapterSha256']==b['candidate']['adapterSha256'];assert a['candidate']['adapterBytes']==b['candidate']['adapterBytes']
          print(json.dumps({'sha256':a['candidate']['adapterSha256'],'bytes':a['candidate']['adapterBytes'],'baselinePassed':a['baseline']['behavioral']['passed'],'candidatePassed':a['candidate']['behavioral']['passed'],'baselineCritical':a['baseline']['behavioral']['criticalPassed'],'candidateCritical':a['candidate']['behavioral']['criticalPassed'],'eligible':a['gates']['eligibleForPromotion']},sort_keys=True))
          PY
      - name: Upload weights, manifests, metrics and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hector-asi-qwen15-v59-slic-${{ github.run_id }}
          path: |
            artifacts/hector-asi-qwen15-v59-a
            artifacts/hector-asi-qwen15-v59-b
            artifacts/logs
          if-no-files-found: warn
          retention-days: 90
