name: Hector model Qwen15 v57 targeted repair
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/hector-model-qwen15-v57-targeted.yml'
      - 'model/hector-asi/training/train_qwen15_v57_targeted.py'
      - 'model/hector-asi/data/qwen15-v57-targeted-train.jsonl'
      - 'model/hector-asi/evals/qwen15-v57-targeted-validation.jsonl'
      - 'model/hector-asi/evals/qwen15-v57-targeted-hidden.jsonl'
  workflow_dispatch:
permissions:
  contents: read
  actions: read
concurrency:
  group: hector-qwen15-v57-${{ github.ref }}
  cancel-in-progress: false
jobs:
  train-qwen15-v57:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SOURCE_ARTIFACT_ID: '8560331055'
      SOURCE_SHA: '31bead5f59982d8e321517fd235b81f992f83d2e3792a55690c2a841ff0e28f8'
      SOURCE_BYTES: '73911112'
      SOURCE_DIR: /tmp/hector-v41/adapter
      TRAIN: model/hector-asi/data/qwen15-v57-targeted-train.jsonl
      VALIDATION: model/hector-asi/evals/qwen15-v57-targeted-validation.jsonl
      HIDDEN: model/hector-asi/evals/qwen15-v57-targeted-hidden.jsonl
      OUT_A: artifacts/hector-asi-qwen15-v57-a
      OUT_B: artifacts/hector-asi-qwen15-v57-b
      TOKENIZERS_PARALLELISM: 'false'
      HF_HOME: /home/runner/.cache/huggingface
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Validate trainer, licensed data and strict splits
        run: |
          set -euo pipefail
          python -m py_compile model/hector-asi/training/train_qwen15_v57_targeted.py
          python - <<'PY'
          import json,unicodedata
          from pathlib import Path
          specs=[('${{ env.TRAIN }}',40),('${{ env.VALIDATION }}',8),('${{ env.HIDDEN }}',24)]
          groups=[]
          norm=lambda s:' '.join(''.join(c for c in unicodedata.normalize('NFKD',s.lower()) if not unicodedata.combining(c)).split())
          for path,n in specs:
            rows=[json.loads(x) for x in Path(path).read_text().splitlines() if x.strip()]
            assert len(rows)==n and len({r['id'] for r in rows})==n
            assert all(r['verification']['verified'] and r['verification']['source']=='author-generated' and r['verification']['license']=='Apache-2.0-compatible' for r in rows)
            prompts={norm(next(m['content'] for m in r['messages'] if m['role']=='user')) for r in rows}; assert len(prompts)==n; groups.append(({r['id'] for r in rows},prompts))
          for i in range(3):
            for j in range(i+1,3): assert not groups[i][0]&groups[j][0] and not groups[i][1]&groups[j][1]
          train=[json.loads(x) for x in Path('${{ env.TRAIN }}').read_text().splitlines() if x.strip()]
          hidden=[json.loads(x) for x in Path('${{ env.HIDDEN }}').read_text().splitlines() if x.strip()]
          assert sum(float(r.get('trainingWeight',1))==2 for r in train)==28
          assert sum(bool(r.get('evaluation',{}).get('critical')) for r in hidden)==6
          print('train=40 validation=8 hidden=24 targeted=28 criticalHidden=6 overlap=0 privateData=false')
          PY
      - name: Download and verify immutable champion v41
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/v41zip /tmp/hector-v41
          curl --fail --location --retry 4 -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${SOURCE_ARTIFACT_ID}/zip" -o /tmp/v41.zip
          unzip -q /tmp/v41.zip -d /tmp/v41zip
          FILE="$(find /tmp/v41zip -type f -path '*/adapter/adapter_model.safetensors' -print -quit)"
          test -n "$FILE"; test "$(sha256sum "$FILE" | awk '{print $1}')" = "$SOURCE_SHA"; test "$(stat -c%s "$FILE")" -eq "$SOURCE_BYTES"
          cp -a "$(dirname "$FILE")" "$SOURCE_DIR"
      - name: Install pinned CPU stack
        run: |
          python -m pip install --disable-pip-version-check --index-url https://download.pytorch.org/whl/cpu torch==2.7.1
          python -m pip install --disable-pip-version-check accelerate==1.8.1 huggingface_hub==0.34.4 peft==0.16.0 safetensors==0.5.3 transformers==4.53.2
      - name: Train two deterministic targeted continuations
        run: |
          set -o pipefail
          mkdir -p artifacts/logs
          /usr/bin/time -v python model/hector-asi/training/train_qwen15_v57_targeted.py --source-adapter "$SOURCE_DIR" --train "$TRAIN" --validation "$VALIDATION" --hidden "$HIDDEN" --out "$OUT_A" --epochs 2 --lr 3e-6 --seed 3057 --max-length 144 --max-new-tokens 64 2>&1 | tee artifacts/logs/v57-a.log
          /usr/bin/time -v python model/hector-asi/training/train_qwen15_v57_targeted.py --source-adapter "$SOURCE_DIR" --train "$TRAIN" --validation "$VALIDATION" --hidden "$HIDDEN" --out "$OUT_B" --epochs 2 --lr 3e-6 --seed 3057 --max-length 144 --max-new-tokens 64 2>&1 | tee artifacts/logs/v57-b.log
      - name: Verify real weights and reproducibility
        run: |
          set -euo pipefail
          A="$OUT_A/adapter/adapter_model.safetensors"; B="$OUT_B/adapter/adapter_model.safetensors"
          test -f "$A" -a -f "$B"; cmp "$A" "$B"; test "$(stat -c%s "$A")" -gt 50000000
          python - <<'PY'
          import json
          from pathlib import Path
          a=json.loads(Path('artifacts/hector-asi-qwen15-v57-a/metrics.json').read_text());b=json.loads(Path('artifacts/hector-asi-qwen15-v57-b/metrics.json').read_text())
          assert a['candidate']['adapterSha256']==b['candidate']['adapterSha256'];assert a['candidate']['adapterBytes']==b['candidate']['adapterBytes'];assert a['candidate']['parameterDeltaL2']>0
          print(json.dumps({'sha256':a['candidate']['adapterSha256'],'bytes':a['candidate']['adapterBytes'],'baselinePassed':a['baseline']['behavioral']['passed'],'candidatePassed':a['candidate']['behavioral']['passed'],'critical':a['candidate']['behavioral']['criticalPassed'],'eligible':a['eligibleForChampion']},sort_keys=True))
          PY
      - name: Upload weights, metrics and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hector-asi-qwen15-v57-targeted-${{ github.run_id }}
          path: |
            artifacts/hector-asi-qwen15-v57-a
            artifacts/hector-asi-qwen15-v57-b
            artifacts/logs
          if-no-files-found: warn
          retention-days: 90
