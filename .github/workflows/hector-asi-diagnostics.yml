name: Hector ASI Diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture tests and build
        shell: bash
        run: |
          set +e
          npm test > test-output.log 2>&1
          echo "$?" > test-exit.txt
          npm run build > build-output.log 2>&1
          echo "$?" > build-exit.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: hector-asi-diagnostics
          path: |
            test-output.log
            test-exit.txt
            build-output.log
            build-exit.txt
          if-no-files-found: error
