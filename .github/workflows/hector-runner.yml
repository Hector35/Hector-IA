name: Hector OS Runner
"on":
  workflow_dispatch:
    inputs:
      task:
        description: Trabajo autorizado para compilar y probar
        required: true
        type: string
permissions:
  contents: read
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test --if-present
      - run: npm run build
      - name: Resumen
        run: echo "Tarea verificada: ${{ inputs.task }}" >> "$GITHUB_STEP_SUMMARY"
