name: Intelligence Evaluation

"on":
  workflow_dispatch:
  push:
    paths:
      - worker/lib/openai.ts
      - worker/lib/openai.test.ts
      - scripts/intelligence-eval.mjs
      - .github/workflows/intelligence-eval.yml

permissions:
  contents: read
  issues: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Run intelligence benchmark
        run: npm test -- worker/lib/openai.test.ts
      - name: Publish result
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create --title "[intelligence-unit] OK ${GITHUB_SHA::7}" --body "✅ Benchmark determinista de enrutamiento, clasificación y memoria relevante superado."
