name: Hector custom model chat

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Identificador opaco opcional del trabajo de inferencia
        required: false
        type: string
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: hector-custom-model-chat-${{ inputs.job_id || github.run_id }}
  cancel-in-progress: false

jobs:
  infer:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CHAT_CHAMPION_MANIFEST: model/hector-asi/registry/chat-champion.json
      ADAPTER_DIR: /tmp/hector-adapter/adapter
      HF_HOME: /home/runner/.cache/huggingface
      TRANSFORMERS_CACHE: /home/runner/.cache/huggingface
      TOKENIZERS_PARALLELISM: 'false'
      HECTOR_WORKER_ORIGIN: https://hector-os.hectorhdzr035.workers.dev
    steps:
      - uses: actions/checkout@v4

      - name: Load promoted chat champion
        id: champion
        shell: bash
        run: |
          set -euo pipefail
          jq -e '.schemaVersion == 1 and .promotionState == "active" and (.runtimeId | length > 0) and (.artifactId > 0) and (.adapterSha256 | test("^[a-f0-9]{64}$")) and (.adapterBytes > 30000000)' "$CHAT_CHAMPION_MANIFEST" >/dev/null
          echo "runtime_id=$(jq -r '.runtimeId' "$CHAT_CHAMPION_MANIFEST")" >> "$GITHUB_OUTPUT"
          echo "base_model=$(jq -r '.baseModel' "$CHAT_CHAMPION_MANIFEST")" >> "$GITHUB_OUTPUT"
          echo "base_revision=$(jq -r '.baseRevision' "$CHAT_CHAMPION_MANIFEST")" >> "$GITHUB_OUTPUT"
          echo "artifact_id=$(jq -r '.artifactId' "$CHAT_CHAMPION_MANIFEST")" >> "$GITHUB_OUTPUT"
          echo "adapter_sha256=$(jq -r '.adapterSha256' "$CHAT_CHAMPION_MANIFEST")" >> "$GITHUB_OUTPUT"
          echo "adapter_bytes=$(jq -r '.adapterBytes' "$CHAT_CHAMPION_MANIFEST")" >> "$GITHUB_OUTPUT"
          echo "source_run_id=$(jq -r '.sourceRunId' "$CHAT_CHAMPION_MANIFEST")" >> "$GITHUB_OUTPUT"

      - name: Resolve one authorized pending inference job
        id: resolve
        shell: bash
        env:
          REQUESTED_JOB_ID: ${{ inputs.job_id }}
        run: |
          set -euo pipefail
          JOB_ID="$REQUESTED_JOB_ID"
          if [ -z "$JOB_ID" ]; then
            OIDC="$(curl -fsS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=hector-asi-model-inference" | jq -r '.value')"
            JOB_ID="$(curl -fsS -H "Authorization: Bearer $OIDC" "$HECTOR_WORKER_ORIGIN/api/intelligence/model-jobs/pending" | jq -r '.jobId // empty')"
          fi
          echo "job_id=$JOB_ID" >> "$GITHUB_OUTPUT"
          if [ -z "$JOB_ID" ]; then echo 'No hay inferencias pendientes; no se consumirá cómputo de modelo.'; fi

      - uses: actions/setup-python@v5
        if: steps.resolve.outputs.job_id != ''
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: model/hector-asi/inference/space/requirements.txt

      - name: Restore frozen base model cache
        if: steps.resolve.outputs.job_id != ''
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/huggingface
          key: qwen-chat-${{ steps.champion.outputs.base_revision }}-v1

      - name: Install CPU inference stack
        if: steps.resolve.outputs.job_id != ''
        run: |
          python -m pip install --disable-pip-version-check --index-url https://download.pytorch.org/whl/cpu torch==2.7.1
          python -m pip install --disable-pip-version-check \
            accelerate==1.8.1 \
            huggingface_hub==0.34.4 \
            peft==0.16.0 \
            requests==2.32.4 \
            safetensors==0.5.3 \
            transformers==4.53.2

      - name: Download and verify immutable Hector adapter
        if: steps.resolve.outputs.job_id != ''
        env:
          GH_TOKEN: ${{ github.token }}
          ADAPTER_ARTIFACT_ID: ${{ steps.champion.outputs.artifact_id }}
          ADAPTER_SHA256: ${{ steps.champion.outputs.adapter_sha256 }}
          ADAPTER_BYTES: ${{ steps.champion.outputs.adapter_bytes }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/hector-artifact /tmp/hector-adapter
          curl --fail --location --retry 4 \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ADAPTER_ARTIFACT_ID}/zip" \
            -o /tmp/hector-adapter.zip
          unzip -q /tmp/hector-adapter.zip -d /tmp/hector-artifact
          ADAPTER_FILE="$(find /tmp/hector-artifact -type f -path '*/adapter/adapter_model.safetensors' -print -quit)"
          test -n "$ADAPTER_FILE"
          test "$(sha256sum "$ADAPTER_FILE" | awk '{print $1}')" = "$ADAPTER_SHA256"
          cp -a "$(dirname "$ADAPTER_FILE")" /tmp/hector-adapter/adapter
          test "$(stat -c%s "$ADAPTER_DIR/adapter_model.safetensors")" -eq "$ADAPTER_BYTES"

      - name: Generate response with promoted personalized weights
        if: steps.resolve.outputs.job_id != ''
        env:
          MODEL_JOB_ID: ${{ steps.resolve.outputs.job_id }}
        run: python model/hector-asi/inference/run_action_chat.py
