name: Hector model Qwen05 v2 training

on:
  pull_request:
    branches: [main]
    paths:
      - 'model/hector-asi/train_qwen05.py'
      - 'model/hector-asi/data/qwen05-sft-v2.jsonl'
      - 'model/hector-asi/evals/qwen05-held-out-v2.jsonl'
      - '.github/workflows/hector-model-qwen05-v2.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  train-qwen05-v2-lora:
    runs-on: ubuntu-latest
    timeout-minutes: 65
    env:
      HF_HUB_DISABLE_TELEMETRY: '1'
      TOKENIZERS_PARALLELISM: 'false'
      PYTHONHASHSEED: '35'
      OMP_NUM_THREADS: '1'
      MKL_NUM_THREADS: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pinned CPU stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu 'torch==2.7.1'
          python -m pip install 'transformers==4.53.2' 'peft==0.16.0' 'accelerate==1.8.1' 'safetensors==0.5.3'
      - name: Train two real Qwen05 v2 LoRA replicas
        run: |
          for replica in a b; do
            python model/hector-asi/train_qwen05.py \
              --experiment-id hector-asi-qwen05-v2 \
              --train-file model/hector-asi/data/qwen05-sft-v2.jsonl \
              --validation-file model/hector-asi/evals/qwen05-held-out-v2.jsonl \
              --output-dir "artifacts/hector-asi-qwen05-v2-${replica}" \
              --epochs 2 --max-length 112 --lr 2e-4 --seed 35
          done
      - name: Prove byte-identical reproducibility
        run: |
          A=$(sha256sum artifacts/hector-asi-qwen05-v2-a/adapter/adapter_model.safetensors | cut -d' ' -f1)
          B=$(sha256sum artifacts/hector-asi-qwen05-v2-b/adapter/adapter_model.safetensors | cut -d' ' -f1)
          test "$A" = "$B"
          cp -R artifacts/hector-asi-qwen05-v2-a artifacts/hector-asi-qwen05-v2
          printf '{"replicas":2,"byteIdentical":true,"adapterSha256":"%s"}\n' "$A" > artifacts/hector-asi-qwen05-v2/reproduction.json
      - name: Verify weights and base-candidate comparison
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root=Path('artifacts/hector-asi-qwen05-v2')
          metrics=json.loads((root/'metrics.json').read_text())
          r=metrics['results']
          assert r['weightsGenerated'] is True
          assert r['parameterDeltaL2'] > 0
          assert r['adapterBytes'] > 1_000_000
          assert r['candidateValidationLoss'] < r['baseValidationLoss']
          assert metrics['dataset']['trainExamples'] == 12
          assert metrics['dataset']['validationExamples'] == 7
          assert (root/'adapter'/'adapter_model.safetensors').is_file()
          assert (root/'SHA256SUMS').is_file()
          assert json.loads((root/'reproduction.json').read_text())['byteIdentical'] is True
          print(json.dumps(metrics,indent=2))
          PY
      - name: Upload immutable adapter and metrics
        uses: actions/upload-artifact@v4
        with:
          name: hector-asi-qwen05-v2-${{ github.run_id }}
          path: artifacts/hector-asi-qwen05-v2
          if-no-files-found: error
          retention-days: 90
