name: Hector model Qwen15 v61 NCA training
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/hector-model-qwen15-v61-nca.yml'
      - 'model/hector-asi/training/train_qwen15_v61_nca.py'
      - 'model/hector-asi/data/qwen15-v61-nca-train.jsonl'
      - 'model/hector-asi/evals/qwen15-v61-nca-validation.jsonl'
  workflow_dispatch:
permissions:
  contents: read
  actions: read
concurrency:
  group: hector-qwen15-v61-nca-${{ github.ref }}
  cancel-in-progress: false
jobs:
  train-qwen15-v61:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SOURCE_ARTIFACT_ID: '8560331055'
      SOURCE_ADAPTER_SHA256: '31bead5f59982d8e321517fd235b81f992f83d2e3792a55690c2a841ff0e28f8'
      SOURCE_ADAPTER_BYTES: '73911112'
      SOURCE_DIR: /tmp/hector-v41/adapter
      TRAIN: model/hector-asi/data/qwen15-v61-nca-train.jsonl
      VALIDATION: model/hector-asi/evals/qwen15-v61-nca-validation.jsonl
      HIDDEN: model/hector-asi/evals/qwen15-v51-hidden.jsonl
      OUT_A: artifacts/hector-asi-qwen15-v61-a
      OUT_B: artifacts/hector-asi-qwen15-v61-b
      TOKENIZERS_PARALLELISM: 'false'
      HF_HOME: /home/runner/.cache/huggingface
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Validate licensed data and trainer
        run: |
          set -euo pipefail
          python -m py_compile model/hector-asi/training/train_qwen15_v61_nca.py
          python - <<'PY'
          import json,os,unicodedata
          from pathlib import Path
          paths=[os.environ['TRAIN'],os.environ['VALIDATION'],os.environ['HIDDEN']]
          rows=[[json.loads(x) for x in Path(p).read_text().splitlines() if x.strip()] for p in paths]
          assert [len(x) for x in rows]==[12,6,18]
          norm=lambda s:' '.join(''.join(c for c in unicodedata.normalize('NFKD',s.lower()) if not unicodedata.combining(c)).split())
          sig=[]
          for group in rows:
            prompts={norm(x['prompt']) for x in group}; assert len(prompts)==len(group); sig.append(prompts)
          assert not sig[0]&sig[1] and not sig[0]&sig[2] and not sig[1]&sig[2]
          assert all(x.get('verified') is True and x.get('provenance')=='author-generated' and x.get('license')=='Apache-2.0-compatible' for x in rows[0]+rows[1])
          assert sum(bool(x.get('critical')) for x in rows[2])==6
          print('train=12 validation=6 hidden=18 critical=6 contamination=0 privateData=false')
          PY
      - name: Download and verify immutable champion V41
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/v41zip /tmp/hector-v41
          curl --fail --location --retry 4 -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${SOURCE_ARTIFACT_ID}/zip" -o /tmp/v41.zip
          unzip -q /tmp/v41.zip -d /tmp/v41zip
          F="$(find /tmp/v41zip -type f -path '*/adapter/adapter_model.safetensors' -print -quit)"
          test -n "$F"
          test "$(sha256sum "$F" | awk '{print $1}')" = "$SOURCE_ADAPTER_SHA256"
          test "$(stat -c%s "$F")" -eq "$SOURCE_ADAPTER_BYTES"
          cp -a "$(dirname "$F")" "$SOURCE_DIR"
      - name: Install pinned CPU stack
        run: |
          python -m pip install --disable-pip-version-check --index-url https://download.pytorch.org/whl/cpu torch==2.7.1
          python -m pip install --disable-pip-version-check accelerate==1.8.1 huggingface_hub==0.34.4 peft==0.16.0 safetensors==0.5.3 transformers==4.53.2
      - name: Train two deterministic NCA continuations
        run: |
          set -o pipefail
          mkdir -p artifacts/logs
          for spec in "$OUT_A:a" "$OUT_B:b"; do
            IFS=: read -r out label <<< "$spec"
            /usr/bin/time -v python model/hector-asi/training/train_qwen15_v61_nca.py --source-adapter "$SOURCE_DIR" --train "$TRAIN" --validation "$VALIDATION" --hidden "$HIDDEN" --out "$out" --epochs 2 --lr 1.5e-6 --beta 0.18 --ce-weight 0.45 --pref-weight 0.55 --anchor 0.03 --seed 3061 2>&1 | tee "artifacts/logs/v61-${label}.log"
          done
      - name: Verify real weights and reproducibility
        run: |
          set -euo pipefail
          A="$OUT_A/adapter/adapter_model.safetensors"; B="$OUT_B/adapter/adapter_model.safetensors"
          test -f "$A" -a -f "$B"; cmp "$A" "$B"; test "$(stat -c%s "$A")" -gt 50000000
          python - <<'PY'
          import json,os
          from pathlib import Path
          a=json.loads(Path(os.environ['OUT_A']+'/metrics.json').read_text());b=json.loads(Path(os.environ['OUT_B']+'/metrics.json').read_text())
          assert a['candidate']['adapterSha256']==b['candidate']['adapterSha256']
          assert a['candidate']['adapterBytes']==b['candidate']['adapterBytes']
          print(json.dumps({'sha256':a['candidate']['adapterSha256'],'bytes':a['candidate']['adapterBytes'],'behaviorBefore':a['baseline']['behavioral']['passed'],'behaviorAfter':a['candidate']['behavioral']['passed'],'criticalAfter':a['candidate']['behavioral']['criticalPassed'],'eligible':a['gates']['eligibleForPromotion']},sort_keys=True))
          PY
      - name: Upload weights manifests metrics and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hector-asi-qwen15-v61-nca-${{ github.run_id }}
          path: |
            artifacts/hector-asi-qwen15-v61-a
            artifacts/hector-asi-qwen15-v61-b
            artifacts/logs
          if-no-files-found: warn
          retention-days: 90
