name: Hector model Qwen15 v37 training
on:
  pull_request:
    branches: [main]
    paths:
      - 'model/hector-asi/data/qwen15-sft-v5.jsonl'
      - 'model/hector-asi/data/qwen15-sft-v6-supplement.jsonl'
      - 'model/hector-asi/evals/qwen15-held-out-v5.jsonl'
      - 'model/hector-asi/evals/qwen15-held-out-v6-supplement.jsonl'
      - 'model/hector-asi/train_qwen15_v37.py'
      - '.github/workflows/hector-model-qwen15-v37.yml'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  train-qwen15-v37:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      HF_HUB_DISABLE_TELEMETRY: '1'
      TOKENIZERS_PARALLELISM: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pinned CPU stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu 'torch==2.7.1'
          python -m pip install 'transformers==4.53.2' 'peft==0.16.0' 'accelerate==1.8.1' 'safetensors==0.5.3'
      - name: Train two lora-only-bias replicas
        run: |
          for replica in a b; do
            python model/hector-asi/train_qwen15_v37.py \
              --train-files model/hector-asi/data/qwen15-sft-v5.jsonl model/hector-asi/data/qwen15-sft-v6-supplement.jsonl \
              --validation-files model/hector-asi/evals/qwen15-held-out-v5.jsonl model/hector-asi/evals/qwen15-held-out-v6-supplement.jsonl \
              --experiment-id hector-asi-qwen15-v37 \
              --output-dir artifacts/hector-asi-qwen15-v37-$replica \
              --epochs 2 --max-length 112 --lr 3e-5 --seed 35
          done
      - name: Verify reproducibility and held-out gate
        run: |
          python - <<'PY'
          import hashlib,json
          from pathlib import Path
          roots=[Path('artifacts/hector-asi-qwen15-v37-a'),Path('artifacts/hector-asi-qwen15-v37-b')]
          def sha(p):return hashlib.sha256(p.read_bytes()).hexdigest()
          metrics=[json.loads((r/'metrics.json').read_text()) for r in roots];hashes=[sha(r/'adapter'/'adapter_model.safetensors') for r in roots]
          m=metrics[0];x=m['results'];summary={'adapterSha256':hashes[0],'byteIdenticalReplicas':int(hashes[0]==hashes[1]),'baselineChampion':'hector-asi-qwen15-v15','baselineChampionValidationLoss':2.1131172180,**{k:x[k] for k in ['baseValidationLoss','candidateValidationLoss','relativeValidationImprovement','parameterDeltaL2','trainableParameters','trainableBiasParameters','adapterBytes']},'trainExamples':m['dataset']['trainExamples'],'validationExamples':m['dataset']['validationExamples']}
          (roots[0]/'reproducibility.json').write_text(json.dumps(summary,indent=2)+'\n');print(json.dumps(summary,indent=2))
          assert hashes[0]==hashes[1]
          for metric,root in zip(metrics,roots):
            r=metric['results'];assert r['weightsGenerated'] and r['parameterDeltaL2']>0;assert r['trainableBiasParameters']>0;assert metric['hyperparameters']['loraBias']=='lora_only';assert r['candidateValidationLoss']<r['baseValidationLoss'];assert r['relativeValidationImprovement']>=.03;assert metric['dataset']['trainExamples']==40 and metric['dataset']['validationExamples']==20;assert metric['dataset']['normalizedPromptOverlap']==0;assert (root/'SHA256SUMS').is_file()
          PY
      - name: Upload immutable adapter and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hector-asi-qwen15-v37-${{ github.run_id }}
          path: artifacts/hector-asi-qwen15-v37-a
          if-no-files-found: error
          retention-days: 90
