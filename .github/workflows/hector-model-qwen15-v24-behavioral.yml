name: Hector model Qwen15 v24 behavioral evaluation

on:
  pull_request:
    branches: [main]
    paths:
      - 'model/hector-asi/evals/qwen15-behavioral-v24.jsonl'
      - 'model/hector-asi/training/evaluate_qwen15_v24_behavioral.py'
      - '.github/workflows/hector-model-qwen15-v24-behavioral.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: qwen15-v24-behavioral-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  evaluate-qwen15-v24:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ADAPTER_ARTIFACT_ID: '8553222316'
      ADAPTER_SHA256: '163cf6bb2fddc36c27d93d048955f6c440a3af1ded5566182de38b3a882e247e'
      ADAPTER_DIR: /tmp/hector-v24/adapter
      EVAL_OUTPUT: /tmp/qwen15-v24-behavioral.json
      HF_HOME: /home/runner/.cache/huggingface
      TRANSFORMERS_CACHE: /home/runner/.cache/huggingface
      TOKENIZERS_PARALLELISM: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: model/hector-asi/inference/space/requirements.txt
      - name: Validate evaluator and sealed data
        run: |
          python -m py_compile model/hector-asi/training/evaluate_qwen15_v24_behavioral.py
          test "$(wc -l < model/hector-asi/evals/qwen15-behavioral-v24.jsonl)" -eq 15
      - name: Restore frozen base model cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/huggingface
          key: qwen25-15b-989aa7980e4cf806f80c7fef2b1adb7bc71aa306-v1
      - name: Install pinned CPU evaluation stack
        run: |
          python -m pip install --disable-pip-version-check --index-url https://download.pytorch.org/whl/cpu torch==2.7.1
          python -m pip install --disable-pip-version-check accelerate==1.8.1 huggingface_hub==0.34.4 peft==0.16.0 safetensors==0.5.3 transformers==4.53.2
      - name: Download and verify immutable v24 adapter
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/v24-artifact /tmp/hector-v24
          curl --fail --location --retry 4 \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ADAPTER_ARTIFACT_ID}/zip" \
            -o /tmp/v24.zip
          unzip -q /tmp/v24.zip -d /tmp/v24-artifact
          ADAPTER_FILE="$(find /tmp/v24-artifact -type f -path '*/adapter/adapter_model.safetensors' -print -quit)"
          test -n "$ADAPTER_FILE"
          test "$(sha256sum "$ADAPTER_FILE" | awk '{print $1}')" = "$ADAPTER_SHA256"
          cp -a "$(dirname "$ADAPTER_FILE")" /tmp/hector-v24/adapter
          test "$(stat -c%s "$ADAPTER_DIR/adapter_model.safetensors")" -eq 73911112
      - name: Compare base versus Qwen15 v24
        run: python model/hector-asi/training/evaluate_qwen15_v24_behavioral.py
      - name: Validate report contract
        run: |
          jq -e '.experimentId == "hector-asi-qwen15-v24" and .adapterSha256 == env.ADAPTER_SHA256 and .dataset.examples == 15 and .lossComparison.candidateV24 < .lossComparison.activeV15 and .gates.safetyNoCriticalRegression == true' "$EVAL_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: hector-asi-qwen15-v24-behavioral-${{ github.run_id }}
          path: /tmp/qwen15-v24-behavioral.json
          retention-days: 90
