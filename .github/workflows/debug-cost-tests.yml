name: Debug Cost Tests
on:
  pull_request:
    branches: [main]
    paths:
      - 'worker/lib/model-pricing*'
      - 'worker/lib/deliberation*'
      - '.github/workflows/debug-cost-tests.yml'
jobs:
  debug-cost-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --silent
      - name: Focused tests
        id: focused
        continue-on-error: true
        run: npx vitest run worker/lib/model-pricing.test.ts worker/lib/deliberation.test.ts --reporter=verbose > test-output.txt 2>&1
      - uses: actions/upload-artifact@v4
        with:
          name: cost-test-output
          path: test-output.txt
      - name: Preserve failure status
        if: steps.focused.outcome == 'failure'
        run: exit 1
