name: Hector model Qwen15 v30 rsLoRA memory-safe training
on:
  pull_request:
    branches: [main]
    paths:
      - 'model/hector-asi/data/qwen15-sft-v5.jsonl'
      - 'model/hector-asi/data/qwen15-sft-v6-supplement.jsonl'
      - 'model/hector-asi/evals/qwen15-held-out-v5.jsonl'
      - 'model/hector-asi/evals/qwen15-held-out-v6-supplement.jsonl'
      - 'model/hector-asi/train_qwen15_v30.py'
      - '.github/workflows/hector-model-qwen15-v30.yml'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  train-qwen15-v30:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      HF_HUB_DISABLE_TELEMETRY: '1'
      TOKENIZERS_PARALLELISM: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Attempt bounded swap when runner permits it
        shell: bash
        run: |
          set +e
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          SWAP_STATUS=$?
          if [ "$SWAP_STATUS" -ne 0 ]; then
            echo "Hosted runner does not permit swapon; continuing with the memory-safe trainer."
            sudo rm -f /swapfile
          fi
          free -h
          exit 0
      - name: Install pinned CPU stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu 'torch==2.7.1'
          python -m pip install 'transformers==4.53.2' 'peft==0.16.0' 'accelerate==1.8.1' 'safetensors==0.5.3'
      - name: Train two memory-safe rsLoRA replicas
        run: |
          set -o pipefail
          for replica in a b; do
            python model/hector-asi/train_qwen15_v30.py \
              --train-files model/hector-asi/data/qwen15-sft-v5.jsonl model/hector-asi/data/qwen15-sft-v6-supplement.jsonl \
              --validation-files model/hector-asi/evals/qwen15-held-out-v5.jsonl model/hector-asi/evals/qwen15-held-out-v6-supplement.jsonl \
              --experiment-id hector-asi-qwen15-v30 \
              --output-dir artifacts/hector-asi-qwen15-v30-$replica \
              --epochs 2 --max-length 112 --lr 3e-5 --seed 35 2>&1 | tee training-$replica.log
          done
      - name: Verify reproducibility and direct v15 gate
        run: |
          python - <<'PY'
          import hashlib,json
          from pathlib import Path
          roots=[Path('artifacts/hector-asi-qwen15-v30-a'),Path('artifacts/hector-asi-qwen15-v30-b')]
          def sha(path):return hashlib.sha256(path.read_bytes()).hexdigest()
          metrics=[json.loads((root/'metrics.json').read_text()) for root in roots]
          hashes=[sha(root/'adapter'/'adapter_model.safetensors') for root in roots]
          leader=2.1131172180
          summary={'adapterSha256':hashes[0],'byteIdenticalReplicas':int(hashes[0]==hashes[1]),'leaderV15ValidationLoss':leader,**{key:metrics[0]['results'][key] for key in ['baseValidationLoss','candidateValidationLoss','relativeValidationImprovement','parameterDeltaL2','trainableParameters','adapterBytes']},'trainExamples':metrics[0]['dataset']['trainExamples'],'validationExamples':metrics[0]['dataset']['validationExamples'],'controlledComparison':'memory-safe rsLoRA retry versus standard LoRA v15 with identical scientific configuration'}
          (roots[0]/'reproducibility.json').write_text(json.dumps(summary,indent=2)+'\n');print(json.dumps(summary,indent=2))
          assert hashes[0]==hashes[1]
          for metric,root in zip(metrics,roots):
            result=metric['results'];assert result['weightsGenerated'] and result['parameterDeltaL2']>0;assert result['candidateValidationLoss']<result['baseValidationLoss'];assert result['relativeValidationImprovement']>=.03;assert result['adapterBytes']>10000000;assert (root/'SHA256SUMS').is_file();assert metric['dataset']['trainExamples']==40;assert metric['dataset']['validationExamples']==20;assert metric['hyperparameters']['useRsLora'] is True
          assert metrics[0]['results']['candidateValidationLoss'] < leader, 'rsLoRA did not beat active v15 leader'
          PY
      - name: Upload immutable adapter and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hector-asi-qwen15-v30-${{ github.run_id }}
          path: |
            artifacts/hector-asi-qwen15-v30-a
            training-a.log
            training-b.log
          if-no-files-found: warn
          retention-days: 90