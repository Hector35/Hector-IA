name: Qwen 397B branch validation

on:
  push:
    branches:
      - agent/qwen397b-pwa
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qwen397-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Tests
        run: npm test
      - name: Production build
        run: npm run build
      - name: Worker dry run
        run: npx wrangler deploy --dry-run
