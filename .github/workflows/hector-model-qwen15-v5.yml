name: Hector model Qwen15 v5 training
on:
  pull_request:
    branches: [main]
    paths:
      - 'model/hector-asi/data/qwen15-sft-v5.jsonl'
      - 'model/hector-asi/evals/qwen15-held-out-v5.jsonl'
      - 'model/hector-asi/train_qwen15.py'
      - '.github/workflows/hector-model-qwen15-v5.yml'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  train-qwen15-v5:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      HF_HUB_DISABLE_TELEMETRY: '1'
      TOKENIZERS_PARALLELISM: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pinned CPU stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu 'torch==2.7.1'
          python -m pip install 'transformers==4.53.2' 'peft==0.16.0' 'accelerate==1.8.1' 'safetensors==0.5.3'
      - name: Validate split integrity
        run: |
          python - <<'PY'
          import json,re
          from pathlib import Path
          paths=[Path('model/hector-asi/data/qwen15-sft-v5.jsonl'),Path('model/hector-asi/evals/qwen15-held-out-v5.jsonl')]
          rows=[[json.loads(x) for x in p.read_text().splitlines() if x.strip()] for p in paths]
          ids=[{r['id'] for r in group} for group in rows]
          assert len(ids[0])==len(rows[0]) and len(ids[1])==len(rows[1])
          assert not ids[0]&ids[1]
          def prompt(r):
            return re.sub(r'\W+',' ',next(x['content'] for x in r['messages'] if x['role']=='user').lower()).strip()
          prompts=[{prompt(r) for r in group} for group in rows]
          assert len(prompts[0])==len(rows[0]) and len(prompts[1])==len(rows[1])
          assert not prompts[0]&prompts[1]
          assert all(r.get('verification',{}).get('verified') is True for group in rows for r in group)
          print({'train':len(rows[0]),'heldOut':len(rows[1])})
          PY
      - name: Train two real Qwen 1.5B LoRA replicas
        run: |
          for replica in a b; do
            python model/hector-asi/train_qwen15.py \
              --train-file model/hector-asi/data/qwen15-sft-v5.jsonl \
              --validation-file model/hector-asi/evals/qwen15-held-out-v5.jsonl \
              --experiment-id hector-asi-qwen15-v5 \
              --output-dir artifacts/hector-asi-qwen15-v5-$replica \
              --epochs 2 --max-length 112 --lr 1.2e-4 --seed 35
          done
      - name: Verify reproducibility and gates
        run: |
          python - <<'PY'
          import hashlib,json
          from pathlib import Path
          roots=[Path('artifacts/hector-asi-qwen15-v5-a'),Path('artifacts/hector-asi-qwen15-v5-b')]
          def sha(p): return hashlib.sha256(p.read_bytes()).hexdigest()
          metrics=[json.loads((r/'metrics.json').read_text()) for r in roots]
          hashes=[sha(r/'adapter'/'adapter_model.safetensors') for r in roots]
          assert hashes[0]==hashes[1], hashes
          for m,r in zip(metrics,roots):
            x=m['results']
            assert x['weightsGenerated'] is True
            assert x['parameterDeltaL2']>0
            assert x['candidateValidationLoss']<x['baseValidationLoss']
            assert x['relativeValidationImprovement']>=0.03
            assert x['adapterBytes']>1000000
            assert (r/'SHA256SUMS').is_file()
          summary={'adapterSha256':hashes[0],'byteIdenticalReplicas':2,'baseValidationLoss':metrics[0]['results']['baseValidationLoss'],'candidateValidationLoss':metrics[0]['results']['candidateValidationLoss'],'relativeValidationImprovement':metrics[0]['results']['relativeValidationImprovement'],'parameterDeltaL2':metrics[0]['results']['parameterDeltaL2'],'trainExamples':metrics[0]['dataset']['trainExamples'],'validationExamples':metrics[0]['dataset']['validationExamples']}
          Path('artifacts/hector-asi-qwen15-v5-a/reproducibility.json').write_text(json.dumps(summary,indent=2)+'\n')
          print(json.dumps(summary,indent=2))
          PY
      - name: Upload immutable adapter and evidence
        uses: actions/upload-artifact@v4
        with:
          name: hector-asi-qwen15-v5-${{ github.run_id }}
          path: artifacts/hector-asi-qwen15-v5-a
          if-no-files-found: error
          retention-days: 90
