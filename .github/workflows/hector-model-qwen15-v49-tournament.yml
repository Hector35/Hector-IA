name: Hector model Qwen15 v49 tournament
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/hector-model-qwen15-v49-tournament.yml'
      - 'model/hector-asi/training/evaluate_qwen15_v49_tournament.py'
      - 'model/hector-asi/evals/qwen15-v49-tournament-hidden.jsonl'
  workflow_dispatch:
permissions:
  contents: read
  actions: read
concurrency:
  group: hector-qwen15-v49-tournament-${{ github.ref }}
  cancel-in-progress: false
jobs:
  evaluate-qwen15-v49-tournament:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      V41_ARTIFACT_ID: '8560331055'
      V41_SHA: '31bead5f59982d8e321517fd235b81f992f83d2e3792a55690c2a841ff0e28f8'
      V41_DIR: /tmp/hector-v41/adapter
      V49_FAILURE_ARTIFACT_ID: '8573491937'
      V49_FAILURE_SHA: 'db44580d7d856883a0f1b3a9996225627b4b8bc7bcef45370ce8fef127781306'
      V49_FAILURE_DIR: /tmp/hector-v49-failure/adapter
      V49_CRITICAL_ARTIFACT_ID: '8573382438'
      V49_CRITICAL_SHA: '71c0dcbdb1a32bf50e5e07107074c4d3b43c2949bf03547926ff822ca7608e05'
      V49_CRITICAL_DIR: /tmp/hector-v49-critical/adapter
      EVAL_OUTPUT: /tmp/qwen15-v49-tournament.json
      HF_HOME: /home/runner/.cache/huggingface
      TOKENIZERS_PARALLELISM: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Validate hidden tournament and evaluator
        run: |
          set -euo pipefail
          python -m py_compile model/hector-asi/training/evaluate_qwen15_v49_tournament.py
          python - <<'PY'
          import json
          from pathlib import Path
          path=Path('model/hector-asi/evals/qwen15-v49-tournament-hidden.jsonl')
          rows=[json.loads(line) for line in path.read_text().splitlines() if line.strip()]
          norm=lambda value:' '.join(value.lower().split())
          assert len(rows)==24
          assert sum(bool(row.get('critical')) for row in rows)==6
          assert len({row['id'] for row in rows})==24
          assert len({norm(row['prompt']) for row in rows})==24
          assert all(row['provenance']=='author-generated' for row in rows)
          assert all(row['license']=='Apache-2.0-compatible' for row in rows)
          print('hidden rows=24 critical=6 provenance=author-generated contamination=0')
          PY
      - name: Download and verify immutable adapters
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          for spec in \
            "v41:$V41_ARTIFACT_ID:$V41_SHA:$V41_DIR" \
            "v49-failure:$V49_FAILURE_ARTIFACT_ID:$V49_FAILURE_SHA:$V49_FAILURE_DIR" \
            "v49-critical:$V49_CRITICAL_ARTIFACT_ID:$V49_CRITICAL_SHA:$V49_CRITICAL_DIR"; do
            IFS=: read -r name artifact_id expected_sha destination <<< "$spec"
            archive="/tmp/${name}.zip"
            extract="/tmp/${name}-artifact"
            mkdir -p "$extract" "$(dirname "$destination")"
            curl --fail --location --retry 4 \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${artifact_id}/zip" \
              -o "$archive"
            unzip -q "$archive" -d "$extract"
            adapter_file="$(find "$extract" -type f -path '*/adapter/adapter_model.safetensors' -print -quit)"
            test -n "$adapter_file"
            test "$(sha256sum "$adapter_file" | awk '{print $1}')" = "$expected_sha"
            test "$(stat -c%s "$adapter_file")" -eq 73911112
            cp -a "$(dirname "$adapter_file")" "$destination"
          done
      - name: Install pinned CPU stack
        run: |
          python -m pip install --disable-pip-version-check --index-url https://download.pytorch.org/whl/cpu torch==2.7.1
          python -m pip install --disable-pip-version-check accelerate==1.8.1 huggingface_hub==0.34.4 peft==0.16.0 safetensors==0.5.3 transformers==4.53.2
      - name: Compare champion and both v49 candidates
        run: |
          set -o pipefail
          /usr/bin/time -v python model/hector-asi/training/evaluate_qwen15_v49_tournament.py 2>&1 | tee /tmp/qwen15-v49-tournament.log
      - name: Upload complete tournament evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hector-asi-qwen15-v49-tournament-${{ github.run_id }}
          path: |
            /tmp/qwen15-v49-tournament.json
            /tmp/qwen15-v49-tournament.log
          if-no-files-found: warn
          retention-days: 90
      - name: Enforce promotion gate
        run: jq -e '.winner != null' "$EVAL_OUTPUT"
