name: Hector model Qwen15 v13 training
on:
  pull_request:
    branches: [main]
    paths:
      - 'model/hector-asi/data/qwen15-sft-v5.jsonl'
      - 'model/hector-asi/evals/qwen15-held-out-v5.jsonl'
      - 'model/hector-asi/train_qwen15_v13.py'
      - '.github/workflows/hector-model-qwen15-v13.yml'
  workflow_dispatch:
permissions:
  contents: read
jobs:
  train-qwen15-v13:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      HF_HUB_DISABLE_TELEMETRY: '1'
      TOKENIZERS_PARALLELISM: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install pinned CPU stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu 'torch==2.7.1'
          python -m pip install 'transformers==4.53.2' 'peft==0.16.0' 'accelerate==1.8.1' 'safetensors==0.5.3'
      - name: Train two assistant-only rank-32 LoRA replicas
        run: |
          for replica in a b; do
            python model/hector-asi/train_qwen15_v13.py \
              --train-file model/hector-asi/data/qwen15-sft-v5.jsonl \
              --validation-file model/hector-asi/evals/qwen15-held-out-v5.jsonl \
              --experiment-id hector-asi-qwen15-v13 \
              --output-dir artifacts/hector-asi-qwen15-v13-$replica \
              --epochs 3 --max-length 112 --lr 4e-5 --seed 35
          done
      - name: Verify reproducibility and controlled gates
        run: |
          python - <<'PY'
          import hashlib,json
          from pathlib import Path
          roots=[Path('artifacts/hector-asi-qwen15-v13-a'),Path('artifacts/hector-asi-qwen15-v13-b')]
          def sha(p): return hashlib.sha256(p.read_bytes()).hexdigest()
          metrics=[json.loads((r/'metrics.json').read_text()) for r in roots]
          hashes=[sha(r/'adapter'/'adapter_model.safetensors') for r in roots]
          x=metrics[0]['results']
          summary={'adapterSha256':hashes[0],'byteIdenticalReplicas':int(hashes[0]==hashes[1]),**{k:x[k] for k in ['baseValidationLoss','candidateValidationLoss','relativeValidationImprovement','baseAssistantOnlyValidationLoss','candidateAssistantOnlyValidationLoss','assistantOnlyRelativeImprovement','previousLeaderValidationLoss','parameterDeltaL2','trainableParameters','adapterBytes']},'trainExamples':metrics[0]['dataset']['trainExamples'],'validationExamples':metrics[0]['dataset']['validationExamples'],'controlledComparison':'same v5 split and v10 hyperparameters; only training labels change to assistant-only tokens'}
          Path('artifacts/hector-asi-qwen15-v13-a/reproducibility.json').write_text(json.dumps(summary,indent=2)+'\n')
          print(json.dumps(summary,indent=2))
          assert hashes[0]==hashes[1], hashes
          for m,r in zip(metrics,roots):
            y=m['results']
            assert y['weightsGenerated'] and y['parameterDeltaL2']>0
            assert y['candidateValidationLoss']<y['baseValidationLoss']
            assert y['relativeValidationImprovement']>=0.03
            assert y['candidateAssistantOnlyValidationLoss']<y['baseAssistantOnlyValidationLoss']
            assert y['assistantOnlyRelativeImprovement']>=0.03
            assert y['adapterBytes']>30000000
            assert (r/'SHA256SUMS').is_file()
          assert x['candidateValidationLoss'] < x['previousLeaderValidationLoss'], (x['candidateValidationLoss'],x['previousLeaderValidationLoss'])
          PY
      - name: Upload immutable adapter and evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hector-asi-qwen15-v13-${{ github.run_id }}
          path: artifacts/hector-asi-qwen15-v13-a
          if-no-files-found: error
          retention-days: 90
