name: Production Smoke Test

"on":
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/production-smoke.yml
      - scripts/intelligence-eval.mjs
      - worker/lib/openai.ts

permissions:
  contents: read
  issues: write

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_API_TOKEN_RAW: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      BASE_URL: https://hector-os.hectorhdzr035.workers.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Prepare Cloudflare credentials
        shell: bash
        run: |
          set -euo pipefail
          CLEAN_TOKEN="$(printf %s "$CLOUDFLARE_API_TOKEN_RAW" | tr -d '[:space:]')"
          test -n "$CLEAN_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          echo "::add-mask::$CLEAN_TOKEN"
          echo "CLOUDFLARE_API_TOKEN=$CLEAN_TOKEN" >> "$GITHUB_ENV"
      - name: Create isolated test identity
        id: identity
        shell: bash
        run: |
          set -euo pipefail
          TEST_ID="$(node --input-type=module -e "import { randomUUID } from 'node:crypto'; console.log(randomUUID())")"
          MEMORY_ID="$(node --input-type=module -e "import { randomUUID } from 'node:crypto'; console.log(randomUUID())")"
          TEST_EMAIL="smoke-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}@hector-os.invalid"
          TEST_PASSWORD="Smoke-$(node --input-type=module -e "import { randomBytes } from 'node:crypto'; console.log(randomBytes(18).toString('base64url'))")"
          read -r SALT HASH < <(TEST_PASSWORD="$TEST_PASSWORD" node --input-type=module <<'NODE'
          import { randomBytes, webcrypto } from 'node:crypto';
          const password = process.env.TEST_PASSWORD;
          const salt = randomBytes(16).toString('base64url');
          const key = await webcrypto.subtle.importKey('raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveBits']);
          const bits = await webcrypto.subtle.deriveBits({name:'PBKDF2',salt:new TextEncoder().encode(salt),iterations:50000,hash:'SHA-256'}, key, 256);
          const hash = Buffer.from(bits).toString('hex');
          console.log(salt, hash);
          NODE
          )
          echo "::add-mask::$TEST_PASSWORD"
          echo "test_id=$TEST_ID" >> "$GITHUB_OUTPUT"
          echo "test_email=$TEST_EMAIL" >> "$GITHUB_OUTPUT"
          echo "test_password=$TEST_PASSWORD" >> "$GITHUB_OUTPUT"
          SQL="INSERT INTO users(id,email,name,password_hash,password_salt) VALUES('$TEST_ID','$TEST_EMAIL','Smoke Test','$HASH','$SALT'); INSERT INTO memories(id,user_id,kind,content,importance,source) VALUES('$MEMORY_ID','$TEST_ID','fact','Código privado de evaluación: ORION-7429.',5,'evaluation');"
          npx wrangler d1 execute hector-os-db --remote --command "$SQL"
      - name: Test production PWA and authenticated API
        shell: bash
        env:
          TEST_EMAIL: ${{ steps.identity.outputs.test_email }}
          TEST_PASSWORD: ${{ steps.identity.outputs.test_password }}
        run: |
          set -euo pipefail
          test "$(curl -fsS -o /tmp/root.html -w '%{http_code}' "$BASE_URL/")" = "200"
          grep -qi '<html' /tmp/root.html
          curl -fsS "$BASE_URL/health" | jq -e '.ok == true'
          LOGIN_CODE="$(curl -sS -c /tmp/cookies.txt -o /tmp/login.json -w '%{http_code}' -H 'Content-Type: application/json' --data "$(jq -nc --arg email "$TEST_EMAIL" --arg password "$TEST_PASSWORD" '{email:$email,password:$password}')" "$BASE_URL/api/auth/login")"
          test "$LOGIN_CODE" = "200"
          jq -e '.user.name == "Smoke Test"' /tmp/login.json
          curl -fsS -b /tmp/cookies.txt "$BASE_URL/api/auth/me" | jq -e '.user.name == "Smoke Test"'
          curl -fsS -b /tmp/cookies.txt "$BASE_URL/api/dashboard" | jq -e 'has("balanceCents") and has("memoryCount")'
          curl -fsS -b /tmp/cookies.txt "$BASE_URL/api/assistant/settings" | jq -e '.settings != null'
          curl -fsS -b /tmp/cookies.txt -H 'Content-Type: application/json' -X PUT --data '{"allow_web":false,"allow_learning":false,"allow_cache":false,"proactive":false,"developer_mode":false}' "$BASE_URL/api/assistant/settings" | jq -e '.settings.allow_web == false'
      - name: Evaluate live intelligence
        env:
          TEST_EMAIL: ${{ steps.identity.outputs.test_email }}
          TEST_PASSWORD: ${{ steps.identity.outputs.test_password }}
        run: node scripts/intelligence-eval.mjs
      - name: Remove isolated test identity
        if: always()
        shell: bash
        env:
          TEST_ID: ${{ steps.identity.outputs.test_id }}
        run: |
          if [ -n "${TEST_ID:-}" ]; then
            npx wrangler d1 execute hector-os-db --remote --command "DELETE FROM users WHERE id='$TEST_ID';" || true
          fi
      - name: Registrar evaluación correcta
        if: success()
        shell: bash
        run: |
          {
            echo "## ✅ Production Intelligence"
            echo
            echo "- Commit: \`$GITHUB_SHA\`"
            echo "- PWA, autenticación, API y limpieza: success"
            echo "- Ejecución: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/intelligence-report.md ]; then
            cat /tmp/intelligence-report.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Publish failure receipt
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f /tmp/intelligence-report.md ]; then
            gh issue create --title "[production-intelligence] FALLO ${GITHUB_SHA::7}" --body-file /tmp/intelligence-report.md
          else
            gh issue create --title "[production-intelligence] FALLO ${GITHUB_SHA::7}" --body "❌ Falló la evaluación end-to-end. Se intentó limpiar la identidad técnica y no se publicaron credenciales."
          fi
