name: Model Chat Test Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-log:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture test output
        shell: bash
        run: |
          set +e
          npm test > test.log 2>&1
          CODE=$?
          cat test.log
          echo "$CODE" > test.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: model-chat-test-${{ github.run_id }}
          path: |
            test.log
            test.exit
          retention-days: 1
