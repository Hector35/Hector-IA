name: Hector model Qwen05 DPO training

on:
  pull_request:
    branches: [main]
    paths:
      - "model/hector-asi/**"
      - ".github/workflows/hector-model-qwen05-dpo.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  train-qwen05-dpo:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      HF_HUB_DISABLE_TELEMETRY: "1"
      TOKENIZERS_PARALLELISM: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install CPU training stack
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu "torch==2.7.1"
          python -m pip install "transformers==4.53.2" "peft==0.16.0" "accelerate==1.8.1" "safetensors==0.5.3"
      - name: Train two deterministic DPO replicas
        run: |
          python model/hector-asi/train_qwen05_dpo.py --output-dir artifacts/hector-asi-qwen05-dpo-v1-a
          python model/hector-asi/train_qwen05_dpo.py --output-dir artifacts/hector-asi-qwen05-dpo-v1-b
      - name: Verify real weights, evaluation and byte identity
        run: |
          python - <<'PY'
          import hashlib,json
          from pathlib import Path
          a=Path('artifacts/hector-asi-qwen05-dpo-v1-a'); b=Path('artifacts/hector-asi-qwen05-dpo-v1-b')
          ma=json.loads((a/'metrics.json').read_text()); mb=json.loads((b/'metrics.json').read_text())
          assert ma['results']['weightsGenerated'] is True
          assert ma['results']['parameterDeltaL2'] > 0
          assert ma['results']['candidateMeanPreferenceMargin'] > ma['results']['baseMeanPreferenceMargin']
          wa=a/'adapter/adapter_model.safetensors'; wb=b/'adapter/adapter_model.safetensors'
          digest=lambda p: hashlib.sha256(p.read_bytes()).hexdigest()
          assert digest(wa)==digest(wb)
          print(json.dumps({'adapterSha256':digest(wa),'results':ma['results']},indent=2))
          PY
      - name: Upload immutable DPO artifact
        uses: actions/upload-artifact@v4
        with:
          name: hector-asi-qwen05-dpo-${{ github.run_id }}
          path: artifacts/hector-asi-qwen05-dpo-v1-a
          if-no-files-found: error
          retention-days: 90
