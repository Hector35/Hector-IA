name: Hector OS Agent Code Runner

"on":
  workflow_dispatch:
    inputs:
      job_id:
        description: Work job UUID
        required: true
        type: string
      task:
        description: Full task and acceptance criteria
        required: true
        type: string
      max_attempts:
        description: Maximum repair attempts
        required: false
        default: '3'
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: hector-agent-${{ inputs.job_id }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BASE_URL: https://hector-os.hectorhdzr035.workers.dev
      AGENT_JOB_ID: ${{ inputs.job_id }}
      AGENT_TASK: ${{ inputs.task }}
      AGENT_MAX_ATTEMPTS: ${{ inputs.max_attempts || '3' }}
      AGENT_PROPOSAL_FILE: /tmp/agent-proposal.json
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Obtain OIDC token
        id: oidc
        shell: bash
        run: |
          TOKEN="$(curl -fsS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=hector-os-agent-runner" | jq -r .value)"
          test -n "$TOKEN"
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
      - name: Edit, test and repair
        id: cycle
        shell: bash
        env:
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          set -euo pipefail
          failure=""
          success=false
          attempts="${AGENT_MAX_ATTEMPTS:-3}"
          status() {
            jq -n --arg jobId "$AGENT_JOB_ID" --arg status "$1" --argjson progress "$2" --arg message "$3" --arg result "${4:-}" '{jobId:$jobId,status:$status,progress:$progress,message:$message} + (if $result=="" then {} else {result:$result} end)' >/tmp/agent-status.json
            curl -fsS -H "Authorization: Bearer $OIDC_TOKEN" -H 'Content-Type: application/json' --data-binary @/tmp/agent-status.json "$BASE_URL/runner/v1/status" >/dev/null
          }
          status working 10 "Runner iniciado; inspeccionando archivos permitidos"
          for attempt in $(seq 1 "$attempts"); do
            git reset --hard HEAD
            git clean -fd
            export ATTEMPT="$attempt" FAILURE="$failure"
            node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const paths=['src/CodexApp.tsx','src/api.ts','src/MarkdownMessage.tsx','src/chat-content.css','src/codex-ui.css','src/codex-mobile.css','worker/index.ts','worker/types.ts','worker/lib/openai.ts','worker/lib/context.ts','worker/routes/agent.ts','worker/routes/intelligence.ts','worker/routes/system.ts','worker/routes/pwa-factory.ts','worker/routes/pwa-runner-status.ts','worker/agent/planner.ts','worker/agent/skills.ts','worker/agent/skills.test.ts','worker/agent/learning.ts'].filter(fs.existsSync);
          fs.writeFileSync('/tmp/agent-request.json',JSON.stringify({jobId:process.env.AGENT_JOB_ID,task:process.env.AGENT_TASK,attempt:Number(process.env.ATTEMPT),failure:process.env.FAILURE||undefined,files:paths.map(path=>({path,content:fs.readFileSync(path,'utf8')}))}));
          NODE
            progress=$((15 + attempt * 15))
            status working "$progress" "Intento $attempt/$attempts: generando cambio mínimo"
            code="$(curl -sS -o "$AGENT_PROPOSAL_FILE" -w '%{http_code}' -H "Authorization: Bearer $OIDC_TOKEN" -H 'Content-Type: application/json' --data-binary @/tmp/agent-request.json "$BASE_URL/runner/v1/proposal" || true)"
            if [ "$code" != "200" ]; then failure="Propuesta HTTP $code: $(cat "$AGENT_PROPOSAL_FILE" 2>/dev/null | head -c 2000)"; status repairing "$progress" "La propuesta falló; cambiando estrategia"; continue; fi
            node scripts/agent-code-runner.mjs
            if git diff --quiet; then failure="El modelo no produjo cambios"; status repairing "$progress" "Sin cambios; solicitando otra estrategia"; continue; fi
            status testing $((progress + 5)) "Ejecutando typecheck, pruebas y build"
            set +e
            { npm run typecheck && npm test -- --passWithNoTests && npm run build; } > /tmp/agent-verify.log 2>&1
            result=$?
            set -e
            if [ "$result" -eq 0 ]; then success=true; echo "attempt=$attempt" >> "$GITHUB_OUTPUT"; break; fi
            failure="$(tail -n 120 /tmp/agent-verify.log | sed -E 's/(sk-[A-Za-z0-9_-]+)/[REDACTED]/g' | head -c 10000)"
            status repairing $((progress + 8)) "Pruebas fallaron en intento $attempt; diagnosticando y reparando"
          done
          if [ "$success" != true ]; then status blocked 70 "Se agotaron los intentos sin una verificación completa" "$failure"; exit 1; fi
          status testing 90 "Typecheck, pruebas y build aprobados; preparando PR"
      - name: Publish verified pull request
        id: publish
        env:
          OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const proposal=JSON.parse(fs.readFileSync(process.env.AGENT_PROPOSAL_FILE,'utf8'));
          fs.writeFileSync('/tmp/agent-publish.json',JSON.stringify({jobId:process.env.AGENT_JOB_ID,proposal,verification:{typecheck:true,tests:true,build:true},runId:process.env.GITHUB_RUN_ID,runAttempt:process.env.GITHUB_RUN_ATTEMPT}));
          NODE
          code="$(curl -sS -o /tmp/agent-published.json -w '%{http_code}' -H "Authorization: Bearer $OIDC_TOKEN" -H 'Content-Type: application/json' --data-binary @/tmp/agent-publish.json "$BASE_URL/runner/v1/publish" || true)"
          test "$code" = "200" || { cat /tmp/agent-published.json; exit 1; }
          jq -e '.published == true and .prUrl' /tmp/agent-published.json
          jq -r .prUrl /tmp/agent-published.json >> "$GITHUB_STEP_SUMMARY"
