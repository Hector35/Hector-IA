name: Cloudflare Credential Preflight

"on":
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/cloudflare-preflight.yml

permissions:
  contents: read
  issues: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CLOUDFLARE_API_TOKEN_RAW: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Validar configuración
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CLOUDFLARE_API_TOKEN_RAW" || { echo "Falta el secret CLOUDFLARE_API_TOKEN"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Falta la variable CLOUDFLARE_ACCOUNT_ID"; exit 1; }
          CLEAN_TOKEN="$(printf %s "$CLOUDFLARE_API_TOKEN_RAW" | tr -d '[:space:]')"
          test -n "$CLEAN_TOKEN" || { echo "CLOUDFLARE_API_TOKEN está vacío"; exit 1; }
          echo "::add-mask::$CLEAN_TOKEN"
          echo "CLOUDFLARE_API_TOKEN=$CLEAN_TOKEN" >> "$GITHUB_ENV"
      - name: Verificar autenticación con Cloudflare
        run: npx wrangler whoami
      - name: Confirmar resultado
        run: |
          echo "## Cloudflare preflight correcto" >> "$GITHUB_STEP_SUMMARY"
          echo "El token fue aceptado y CLOUDFLARE_ACCOUNT_ID está configurado." >> "$GITHUB_STEP_SUMMARY"
      - name: Publicar resultado verificable
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const ok = '${{ job.status }}' === 'success';
            const title = `[preflight-cloudflare] ${ok ? 'OK' : 'FALLO'} ${context.sha.slice(0, 7)}`;
            const body = ok
              ? '✅ Cloudflare aceptó CLOUDFLARE_API_TOKEN y CLOUDFLARE_ACCOUNT_ID está configurado. No se expuso ningún valor.'
              : '❌ El preflight de Cloudflare falló. Revisa el workflow Cloudflare Credential Preflight para identificar si falta el secret, la variable o permisos del token. No se expuso ningún valor.';
            await github.rest.issues.create({owner: context.repo.owner, repo: context.repo.repo, title, body});