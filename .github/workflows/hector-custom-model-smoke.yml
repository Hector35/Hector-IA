name: Hector custom model smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/hector-custom-model-smoke.yml'
      - 'model/hector-asi/inference/smoke_custom_model.py'
      - 'model/hector-asi/registry/chat-champion.json'
      - 'worker/lib/chat-champion.ts'
      - 'worker/routes/model-chat.ts'

permissions:
  contents: read
  actions: read
  issues: write

concurrency:
  group: hector-custom-model-smoke
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CHAT_CHAMPION_MANIFEST: model/hector-asi/registry/chat-champion.json
      ADAPTER_DIR: /tmp/hector-adapter/adapter
      SMOKE_OUTPUT: /tmp/hector-custom-model-smoke.json
      HF_HOME: /home/runner/.cache/huggingface
      TRANSFORMERS_CACHE: /home/runner/.cache/huggingface
      TOKENIZERS_PARALLELISM: 'false'
    steps:
      - uses: actions/checkout@v4

      - name: Load promoted chat champion
        id: champion
        shell: bash
        run: |
          set -euo pipefail
          jq -e '.schemaVersion == 1 and .promotionState == "active" and (.runtimeId | length > 0) and (.artifactId > 0) and (.adapterSha256 | test("^[a-f0-9]{64}$")) and (.adapterBytes > 30000000)' "$CHAT_CHAMPION_MANIFEST" >/dev/null
          echo "runtime_id=$(jq -r '.runtimeId' "$CHAT_CHAMPION_MANIFEST")" >> "$GITHUB_OUTPUT"
          echo "base_model=$(jq -r '.baseModel' "$CHAT_CHAMPION_MANIFEST")" >> "$GITHUB_OUTPUT"
          echo "base_revision=$(jq -r '.baseRevision' "$CHAT_CHAMPION_MANIFEST")" >> "$GITHUB_OUTPUT"
          echo "artifact_id=$(jq -r '.artifactId' "$CHAT_CHAMPION_MANIFEST")" >> "$GITHUB_OUTPUT"
          echo "adapter_sha256=$(jq -r '.adapterSha256' "$CHAT_CHAMPION_MANIFEST")" >> "$GITHUB_OUTPUT"
          echo "adapter_bytes=$(jq -r '.adapterBytes' "$CHAT_CHAMPION_MANIFEST")" >> "$GITHUB_OUTPUT"
          echo "source_run_id=$(jq -r '.sourceRunId' "$CHAT_CHAMPION_MANIFEST")" >> "$GITHUB_OUTPUT"

      - name: Wait for Hector ASI custom queue deployment
        shell: bash
        env:
          RUNTIME_ID: ${{ steps.champion.outputs.runtime_id }}
          ADAPTER_SHA256: ${{ steps.champion.outputs.adapter_sha256 }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 60); do
            if curl -fsS https://hector-os.hectorhdzr035.workers.dev/health > /tmp/hector-health.json; then
              cat /tmp/hector-health.json
              if jq -e --arg runtime "$RUNTIME_ID" --arg sha "$ADAPTER_SHA256" '.ok == true and .customModel.runtime == $runtime and .customModel.adapterSha256 == $sha and .customModel.mode == "github-actions"' /tmp/hector-health.json >/dev/null; then
                exit 0
              fi
            fi
            sleep 10
          done
          echo 'Producción no reportó el campeón neuronal esperado' >&2
          exit 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: model/hector-asi/inference/space/requirements.txt

      - name: Restore frozen base model cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/huggingface
          key: qwen-chat-${{ steps.champion.outputs.base_revision }}-v1

      - name: Install CPU inference stack
        run: |
          python -m pip install --disable-pip-version-check --index-url https://download.pytorch.org/whl/cpu torch==2.7.1
          python -m pip install --disable-pip-version-check \
            accelerate==1.8.1 \
            huggingface_hub==0.34.4 \
            peft==0.16.0 \
            safetensors==0.5.3 \
            transformers==4.53.2

      - name: Download and verify immutable Hector adapter
        env:
          GH_TOKEN: ${{ github.token }}
          ADAPTER_ARTIFACT_ID: ${{ steps.champion.outputs.artifact_id }}
          ADAPTER_SHA256: ${{ steps.champion.outputs.adapter_sha256 }}
          ADAPTER_BYTES: ${{ steps.champion.outputs.adapter_bytes }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/hector-artifact /tmp/hector-adapter
          curl --fail --location --retry 4 \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ADAPTER_ARTIFACT_ID}/zip" \
            -o /tmp/hector-adapter.zip
          unzip -q /tmp/hector-adapter.zip -d /tmp/hector-artifact
          ADAPTER_FILE="$(find /tmp/hector-artifact -type f -path '*/adapter/adapter_model.safetensors' -print -quit)"
          test -n "$ADAPTER_FILE"
          test "$(sha256sum "$ADAPTER_FILE" | awk '{print $1}')" = "$ADAPTER_SHA256"
          cp -a "$(dirname "$ADAPTER_FILE")" /tmp/hector-adapter/adapter
          test "$(stat -c%s "$ADAPTER_DIR/adapter_model.safetensors")" -eq "$ADAPTER_BYTES"

      - name: Generate real neural response
        run: python model/hector-asi/inference/smoke_custom_model.py

      - name: Validate evidence
        run: |
          python - <<'PY'
          import json, os
          manifest=json.load(open(os.environ['CHAT_CHAMPION_MANIFEST']))
          evidence=json.load(open(os.environ['SMOKE_OUTPUT']))
          assert evidence['ok'] is True
          for key in ('runtimeId','baseModel','baseRevision','artifactId','adapterSha256','adapterBytes','sourceRunId'):
              assert evidence[key] == manifest[key], (key,evidence[key],manifest[key])
          assert evidence['response'].strip()
          print('chat champion smoke evidence: OK')
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: hector-custom-model-smoke-${{ github.run_id }}
          path: |
            /tmp/hector-custom-model-smoke.json
            /tmp/hector-health.json
            model/hector-asi/registry/chat-champion.json
          retention-days: 30

      - name: Publish success receipt
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          RUNTIME="$(jq -r '.runtimeId' "$SMOKE_OUTPUT")"
          BASE="$(jq -r '.baseModel+"@"+.baseRevision' "$SMOKE_OUTPUT")"
          SHA="$(jq -r '.adapterSha256' "$SMOKE_OUTPUT")"
          BYTES="$(jq -r '.adapterBytes' "$SMOKE_OUTPUT")"
          TOKENS="$(jq -r '.outputTokens' "$SMOKE_OUTPUT")"
          LATENCY="$(jq -r '.latencyMs' "$SMOKE_OUTPUT")"
          SOURCE_RUN="$(jq -r '.sourceRunId' "$SMOKE_OUTPUT")"
          BODY="✅ Inferencia neuronal real verificada.\n\n- runtime: ${RUNTIME}\n- base: ${BASE}\n- adapter SHA-256: ${SHA}\n- adapter bytes: ${BYTES}\n- source run: ${SOURCE_RUN}\n- output tokens: ${TOKENS}\n- latency ms: ${LATENCY}\n- producción: customModel.mode=github-actions\n- evidencia: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh issue create --title "[custom-model-smoke] OK ${RUNTIME} ${GITHUB_SHA::7}" --body "$BODY"

      - name: Publish failure receipt
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          RUNTIME="$(jq -r '.runtimeId // "desconocido"' "$CHAT_CHAMPION_MANIFEST" 2>/dev/null || echo desconocido)"
          BODY="❌ La inferencia de humo del campeón ${RUNTIME} falló. No se declaró el runtime como verificado.\n\nRun: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          gh issue create --title "[custom-model-smoke] FALLO ${RUNTIME} ${GITHUB_SHA::7}" --body "$BODY"
