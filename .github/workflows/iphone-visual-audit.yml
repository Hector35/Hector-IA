name: iPhone Visual Audit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/iphone-visual-audit.mjs'
      - 'scripts/iphone-visual-regression.mjs'
      - 'scripts/iphone-visual-summary.mjs'
      - '.github/workflows/iphone-visual-audit.yml'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependencias visuales
        run: |
          npm ci
          npm install --no-save playwright pixelmatch pngjs
          npx playwright install --with-deps chromium
      - name: Construir aplicación actual
        run: npm run build
      - name: Iniciar aplicación actual
        run: |
          npm run dev -- --mode test --host 127.0.0.1 --port 4173 > /tmp/hector-current.log 2>&1 &
          echo $! > /tmp/hector-current.pid
          for attempt in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/hector-current.log
          exit 1
      - name: Auditar versión actual
        env:
          VISUAL_AUDIT_URL: http://127.0.0.1:4173
          VISUAL_AUDIT_OUTPUT: visual-current
        run: node scripts/iphone-visual-audit.mjs
      - name: Preparar rama base
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          git fetch origin "$BASE_REF"
          git worktree add /tmp/hector-visual-baseline "origin/$BASE_REF"
          cd /tmp/hector-visual-baseline
          npm ci
          npm run build
          npm run dev -- --mode test --host 127.0.0.1 --port 4174 > /tmp/hector-baseline.log 2>&1 &
          echo $! > /tmp/hector-baseline.pid
          for attempt in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:4174 >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/hector-baseline.log
          exit 1
      - name: Auditar rama base con fixtures deterministas
        env:
          VISUAL_AUDIT_URL: http://127.0.0.1:4174
          VISUAL_AUDIT_OUTPUT: visual-baseline
        run: node scripts/iphone-visual-audit.mjs
      - name: Comparar píxeles y generar diffs
        id: regression
        continue-on-error: true
        env:
          VISUAL_BASELINE_DIR: visual-baseline
          VISUAL_CURRENT_DIR: visual-current
          VISUAL_DIFF_DIR: visual-diff
          VISUAL_MAX_CHANGED_RATIO: '0.02'
          VISUAL_MAX_CHANGED_PIXELS: '12000'
          VISUAL_PIXEL_THRESHOLD: '0.12'
        run: node scripts/iphone-visual-regression.mjs
      - name: Generar resumen legible
        if: always() && hashFiles('visual-diff/regression-report.json') != ''
        env:
          VISUAL_ARTIFACT_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          VISUAL_CHANGE_APPROVED: ${{ contains(github.event.pull_request.labels.*.name, 'visual-change-approved') }}
        run: |
          node scripts/iphone-visual-summary.mjs
          cat visual-diff/pr-summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Publicar o actualizar comentario del PR
        if: always() && github.event_name == 'pull_request' && hashFiles('visual-diff/pr-summary.md') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- hector-iphone-visual-regression -->';
            const body = fs.readFileSync('visual-diff/pr-summary.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100
            });
            const previous = comments.find(comment => comment.user?.type === 'Bot' && comment.body?.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
      - name: Mostrar logs de servidores
        if: failure()
        run: |
          echo '=== actual ==='
          cat /tmp/hector-current.log || true
          echo '=== base ==='
          cat /tmp/hector-baseline.log || true
      - name: Detener servidores
        if: always()
        run: |
          test ! -f /tmp/hector-current.pid || kill "$(cat /tmp/hector-current.pid)" || true
          test ! -f /tmp/hector-baseline.pid || kill "$(cat /tmp/hector-baseline.pid)" || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iphone-visual-regression
          path: |
            visual-current
            visual-baseline
            visual-diff
          if-no-files-found: warn
          retention-days: 14
      - name: Aplicar resultado de regresión
        if: always() && steps.regression.outcome == 'failure' && !contains(github.event.pull_request.labels.*.name, 'visual-change-approved')
        run: |
          echo 'La regresión visual superó los umbrales y no tiene aprobación explícita.'
          exit 1
