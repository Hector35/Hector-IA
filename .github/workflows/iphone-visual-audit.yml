name: iPhone Visual Audit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/iphone-visual-audit.mjs'
      - '.github/workflows/iphone-visual-audit.yml'
      - 'package.json'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Instalar dependencias
        run: npm ci
      - name: Instalar Playwright
        run: npm install --no-save playwright && npx playwright install --with-deps chromium
      - name: Construir aplicación
        run: npm run build
      - name: Iniciar servidor local
        run: |
          npm run dev -- --host 127.0.0.1 --port 4173 > /tmp/hector-visual-server.log 2>&1 &
          echo $! > /tmp/hector-visual-server.pid
          for attempt in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:4173 >/dev/null; then exit 0; fi
            sleep 1
          done
          cat /tmp/hector-visual-server.log
          exit 1
      - name: Auditar iPhone SE y 13 Pro
        env:
          VISUAL_AUDIT_URL: http://127.0.0.1:4173
          VISUAL_AUDIT_OUTPUT: visual-audit
        run: node scripts/iphone-visual-audit.mjs
      - name: Mostrar log del servidor
        if: failure()
        run: cat /tmp/hector-visual-server.log || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iphone-visual-audit
          path: visual-audit
          if-no-files-found: warn
          retention-days: 14
