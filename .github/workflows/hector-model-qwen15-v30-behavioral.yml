name: Hector model Qwen15 v30 behavioral evaluation

on:
  pull_request:
    branches: [main]
    paths:
      - 'model/hector-asi/evals/qwen15-behavioral-v30.jsonl'
      - 'model/hector-asi/training/evaluate_qwen15_v30_behavioral.py'
      - 'model/hector-asi/registry/qwen15-v30-candidate.json'
      - '.github/workflows/hector-model-qwen15-v30-behavioral.yml'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: qwen15-v30-behavioral-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  evaluate-qwen15-v30:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ADAPTER_ARTIFACT_ID: '8556923637'
      ADAPTER_SHA256: '631b95f693c2b24f3a263ae06afd014dc9c19743db4008ec726435b761380c4b'
      ADAPTER_DIR: /tmp/hector-v30/adapter
      EVAL_OUTPUT: /tmp/qwen15-v30-behavioral.json
      HF_HOME: /home/runner/.cache/huggingface
      TRANSFORMERS_CACHE: /home/runner/.cache/huggingface
      TOKENIZERS_PARALLELISM: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: model/hector-asi/inference/space/requirements.txt
      - name: Validate evaluator and sealed data
        run: |
          python -m py_compile model/hector-asi/training/evaluate_qwen15_v30_behavioral.py
          test "$(wc -l < model/hector-asi/evals/qwen15-behavioral-v30.jsonl)" -eq 15
          jq -e '.experimentId == "hector-asi-qwen15-v30" and .artifact.adapterSha256 == env.ADAPTER_SHA256 and .results.candidateValidationLoss < .results.activeV15Loss and .results.candidateValidationLoss < .results.qwen15V24Loss' model/hector-asi/registry/qwen15-v30-candidate.json
      - name: Restore frozen base model cache
        uses: actions/cache@v4
        with:
          path: /home/runner/.cache/huggingface
          key: qwen25-15b-989aa7980e4cf806f80c7fef2b1adb7bc71aa306-v1
      - name: Install pinned CPU evaluation stack
        run: |
          python -m pip install --disable-pip-version-check --index-url https://download.pytorch.org/whl/cpu torch==2.7.1
          python -m pip install --disable-pip-version-check accelerate==1.8.1 huggingface_hub==0.34.4 peft==0.16.0 safetensors==0.5.3 transformers==4.53.2
      - name: Download and verify immutable v30 adapter
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/v30-artifact /tmp/hector-v30
          curl --fail --location --retry 4 \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${ADAPTER_ARTIFACT_ID}/zip" \
            -o /tmp/v30.zip
          unzip -q /tmp/v30.zip -d /tmp/v30-artifact
          ADAPTER_FILE="$(find /tmp/v30-artifact -type f -path '*/adapter/adapter_model.safetensors' -print -quit)"
          test -n "$ADAPTER_FILE"
          test "$(sha256sum "$ADAPTER_FILE" | awk '{print $1}')" = "$ADAPTER_SHA256"
          cp -a "$(dirname "$ADAPTER_FILE")" /tmp/hector-v30/adapter
          test "$(stat -c%s "$ADAPTER_DIR/adapter_model.safetensors")" -eq 73911112
      - name: Compare base versus Qwen15 v30
        run: python model/hector-asi/training/evaluate_qwen15_v30_behavioral.py
      - name: Upload immutable behavioral evidence
        if: always() && hashFiles('/tmp/qwen15-v30-behavioral.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: hector-asi-qwen15-v30-behavioral-${{ github.run_id }}
          path: /tmp/qwen15-v30-behavioral.json
          retention-days: 90
      - name: Enforce promotion gate
        run: |
          jq -e '.experimentId == "hector-asi-qwen15-v30" and .adapterSha256 == env.ADAPTER_SHA256 and .dataset.examples == 15 and .lossComparison.candidateV30 < .lossComparison.activeV15 and .lossComparison.candidateV30 < .lossComparison.qwen15V24 and .gates.behavioralNonRegression == true and .gates.safetyNoCriticalRegression == true and .gates.latencyAcceptable == true and .gates.eligibleForChatPromotion == true' "$EVAL_OUTPUT"
