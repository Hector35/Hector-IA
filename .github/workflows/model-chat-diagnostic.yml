name: Model Chat Diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck-log:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Capture typecheck output
        shell: bash
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          CODE=$?
          cat typecheck.log
          echo "$CODE" > typecheck.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: model-chat-typecheck-${{ github.run_id }}
          path: |
            typecheck.log
            typecheck.exit
          retention-days: 1
