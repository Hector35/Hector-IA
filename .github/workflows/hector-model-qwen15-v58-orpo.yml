name: Hector model Qwen15 v58 ORPO training
on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/hector-model-qwen15-v58-orpo.yml'
      - 'model/hector-asi/training/train_qwen15_v58_orpo.py'
      - 'model/hector-asi/data/qwen15-v58-orpo-train.jsonl'
      - 'model/hector-asi/evals/qwen15-v58-orpo-validation.jsonl'
  workflow_dispatch:
permissions:
  contents: read
  actions: read
concurrency:
  group: hector-qwen15-v58-orpo-${{ github.ref }}
  cancel-in-progress: false
jobs:
  train-qwen15-v58:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SOURCE_ARTIFACT_ID: '8560331055'
      SOURCE_SHA: '31bead5f59982d8e321517fd235b81f992f83d2e3792a55690c2a841ff0e28f8'
      SOURCE_DIR: /tmp/hector-v41/adapter
      TRAIN: model/hector-asi/data/qwen15-v58-orpo-train.jsonl
      VALIDATION: model/hector-asi/evals/qwen15-v58-orpo-validation.jsonl
      HIDDEN: model/hector-asi/evals/qwen15-v51-hidden.jsonl
      OUT_A: artifacts/hector-asi-qwen15-v58-a
      OUT_B: artifacts/hector-asi-qwen15-v58-b
      TOKENIZERS_PARALLELISM: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Validate trainer, provenance and splits
        run: |
          set -euo pipefail
          python -m py_compile model/hector-asi/training/train_qwen15_v58_orpo.py
          python - <<'PY'
          import json, os, unicodedata
          from pathlib import Path
          tr=[json.loads(x) for x in Path(os.environ['TRAIN']).read_text().splitlines() if x.strip()]
          va=[json.loads(x) for x in Path(os.environ['VALIDATION']).read_text().splitlines() if x.strip()]
          hi=[json.loads(x) for x in Path(os.environ['HIDDEN']).read_text().splitlines() if x.strip()]
          assert (len(tr),len(va),len(hi))==(8,4,18)
          norm=lambda s:' '.join(unicodedata.normalize('NFKD',s).encode('ascii','ignore').decode().lower().split())
          sets=[{norm(r['prompt']) for r in rows} for rows in (tr,va,hi)]
          assert not sets[0]&sets[1] and not sets[0]&sets[2] and not sets[1]&sets[2]
          assert all(r['verified'] and r['provenance']=='author-generated' and r['license']=='Apache-2.0-compatible' for r in tr+va)
          print('train=8 validation=4 hidden=18 contamination=0 privateData=false')
          PY
      - name: Download and verify immutable champion V41
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/v41zip /tmp/hector-v41
          curl --fail --location --retry 4 -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${SOURCE_ARTIFACT_ID}/zip" -o /tmp/v41.zip
          unzip -q /tmp/v41.zip -d /tmp/v41zip
          F="$(find /tmp/v41zip -type f -path '*/adapter/adapter_model.safetensors' -print -quit)"
          test -n "$F"; test "$(sha256sum "$F"|awk '{print $1}')" = "$SOURCE_SHA"; test "$(stat -c%s "$F")" -eq 73911112
          cp -a "$(dirname "$F")" "$SOURCE_DIR"
      - name: Install pinned CPU stack
        run: |
          python -m pip install --disable-pip-version-check --index-url https://download.pytorch.org/whl/cpu torch==2.7.1
          python -m pip install --disable-pip-version-check accelerate==1.8.1 huggingface_hub==0.34.4 peft==0.16.0 safetensors==0.5.3 transformers==4.53.2
      - name: Train two deterministic ORPO continuations
        run: |
          set -o pipefail
          mkdir -p artifacts/logs
          /usr/bin/time -v python model/hector-asi/training/train_qwen15_v58_orpo.py --source-adapter "$SOURCE_DIR" --train "$TRAIN" --validation "$VALIDATION" --hidden "$HIDDEN" --out "$OUT_A" --epochs 2 --lr 2e-6 --beta .20 --orpo-lambda .35 --anchor .02 --seed 3058 2>&1 | tee artifacts/logs/v58-a.log
          /usr/bin/time -v python model/hector-asi/training/train_qwen15_v58_orpo.py --source-adapter "$SOURCE_DIR" --train "$TRAIN" --validation "$VALIDATION" --hidden "$HIDDEN" --out "$OUT_B" --epochs 2 --lr 2e-6 --beta .20 --orpo-lambda .35 --anchor .02 --seed 3058 2>&1 | tee artifacts/logs/v58-b.log
      - name: Verify real weights and reproducibility
        run: |
          set -euo pipefail
          A="$OUT_A/adapter/adapter_model.safetensors"; B="$OUT_B/adapter/adapter_model.safetensors"
          test -f "$A" -a -f "$B"; cmp "$A" "$B"; test "$(stat -c%s "$A")" -gt 50000000
          python - <<'PY'
          import json
          from pathlib import Path
          a=json.loads(Path('artifacts/hector-asi-qwen15-v58-a/metrics.json').read_text());b=json.loads(Path('artifacts/hector-asi-qwen15-v58-b/metrics.json').read_text())
          assert a['candidate']['adapterSha256']==b['candidate']['adapterSha256']
          assert a['candidate']['adapterBytes']==b['candidate']['adapterBytes']
          print(json.dumps({'sha256':a['candidate']['adapterSha256'],'bytes':a['candidate']['adapterBytes'],'before':a['baseline']['behavioral']['passed'],'after':a['candidate']['behavioral']['passed'],'critical':a['candidate']['behavioral']['criticalPassed'],'eligible':a['gates']['eligibleForPromotion']},sort_keys=True))
          PY
      - name: Upload weights, metrics and logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hector-asi-qwen15-v58-orpo-${{ github.run_id }}
          path: |
            artifacts/hector-asi-qwen15-v58-a
            artifacts/hector-asi-qwen15-v58-b
            artifacts/logs
          if-no-files-found: warn
          retention-days: 90
